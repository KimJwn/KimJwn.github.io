<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>법제화 상태 상세표</title>
  <link rel="stylesheet" href="/assets/palette.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Poppins", "Noto Sans KR", "Segoe UI", sans-serif;
      color: #0f172a;
      background:
        radial-gradient(circle at top left, rgba(15,94,234,0.12), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(148,163,184,0.18), transparent 22%),
        linear-gradient(180deg, #f8fbff 0%, #f8fafc 44%, #ffffff 100%);
    }
    .wrap { max-width: var(--layout-page-max-width); margin: 0 auto; padding: var(--layout-page-padding-top) var(--layout-page-padding-x) var(--layout-page-padding-bottom); }
    .card {
      background: linear-gradient(135deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.84) 100%);
      border: 1px solid #d9e3f2;
      border-radius: 24px;
      padding: var(--layout-card-padding);
      box-shadow: 0 22px 60px rgba(15,23,42,0.08);
      overflow: hidden;
    }
    .shell { display:grid; grid-template-columns: var(--layout-sidebar-width) minmax(0,1fr); gap: var(--layout-shell-gap); align-items:start; }
    .sidebar { position: sticky; top: 24px; display:grid; gap:14px; }
    .sidebar-card {
      border: 1px solid #d9e3f2;
      border-radius: 20px;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 10px 28px rgba(15,23,42,0.05);
      padding: 18px;
    }
    .sidebar-kicker { margin:0 0 8px; color:#0f5eea; font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
    h1 { margin: 0 0 10px; text-align: left; font-size: 34px; line-height: 1.04; letter-spacing: -.05em; }
    .ctrl {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid #d6deea;
      background: rgba(255,255,255,0.82);
      width: fit-content;
    }
    .global-tabs {
      display:grid;
      gap:8px;
    }
    .g-tab {
      text-decoration:none; font-size:12px; font-weight:700; padding:10px 12px; border-radius:14px;
      border:1px solid var(--line); background:#fff; color:var(--sub);
      font-family:"Poppins","Noto Sans KR","Segoe UI",sans-serif;
    }
    .g-tab.active { background:var(--accent-soft); border-color:var(--accent-line); color:var(--accent-strong); }
    .side-links { display:grid; gap:8px; }
    .side-link { text-decoration:none; font-size:13px; font-weight:600; color:#334155; padding:10px 12px; border-radius:12px; background:#f8fbff; border:1px solid #d9e3f2; }
    .content { display:grid; gap:18px; min-width:0; }
    select {
      font-size: 14px; padding: 6px 8px; border-radius: 8px;
      border: 1px solid #d6deea; background: #fff;
    }
    .status-wrap { overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; border: 1px solid #d9e3f2; border-radius: 20px; background: rgba(255,255,255,0.9); box-shadow: 0 10px 28px rgba(15,23,42,0.05); }
    table { width: max-content; min-width: 100%; border-collapse: collapse; background: #fff; }
    table th:last-child, table td:last-child { min-width: 220px; }
    th, td { border: 1px solid var(--line); padding: 14px 12px; vertical-align: top; text-align: left; font-size: var(--layout-main-table-font-size); line-height: var(--layout-main-table-line-height); }
    th { background: var(--table-head); }
    .muted { color: #475569; font-size: 14px; margin: 0; max-width: 34ch; line-height: 1.7; }
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      padding: 4px 6px;
      border: 1px solid transparent;
      white-space: nowrap;
      text-align: center;
      margin-left: 6px;
      vertical-align: middle;
    }
    .pill-strong { background: var(--status-strong-bg); color: var(--status-strong-fg); border-color: var(--status-strong-line); }
    .pill-mid { background: var(--status-mid-bg); color: var(--status-mid-fg); border-color: var(--status-mid-line); }
    .pill-weak { background: var(--status-weak-bg); color: var(--status-weak-fg); border-color: var(--status-weak-line); }
    .pill-unclear { background: var(--status-unclear-bg); color: var(--status-unclear-fg); border-color: var(--status-unclear-line); }
    .pill-nolaw { background: var(--status-nolaw-bg); color: var(--status-nolaw-fg); border-color: var(--status-nolaw-line); }
    .pill-na { background: var(--status-na-bg); color: var(--status-na-fg); border-color: var(--status-na-line); }
    .status-text { white-space: normal; word-break: break-word; overflow-wrap: anywhere; }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="shell">
        <aside class="sidebar">
          <section class="sidebar-card">
            <p class="sidebar-kicker">Cross-country</p>
            <h1 id="title"></h1>
            <p class="muted" id="subtitle"></p>
          </section>
          <section class="sidebar-card">
            <div class="ctrl">
              <label for="lang" id="langLabel"></label>
              <select id="lang">
                <option value="ko">한국어</option>
                <option value="en" selected>English</option>
              </select>
            </div>
          </section>
          <nav class="sidebar-card global-tabs">
            <a id="tabHome" class="g-tab" href="/"></a>
            <a id="tabCountries" class="g-tab" href="/countries.html"></a>
            <a id="tabCompare" class="g-tab active" href="/status.html"></a>
            <a id="tabPenalties" class="g-tab" href="/penalties.html"></a>
            <a id="tabRQ" class="g-tab" href="/rq.html"></a>
          </nav>
          <nav class="sidebar-card side-links">
            <a class="side-link" href="#statusTable">Status Table</a>
          </nav>
        </aside>
        <div class="content">
          <section class="status-wrap" id="statusTable">
            <div id="host"></div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <script>
    const TXT = {
      ko: {
        title: '국가별 법제화 상태 상세표',
        lang: '언어',
        navHome: 'Home',
        navCountries: 'Countries',
        navCompare: 'Compare',
        navPenalties: 'Penalties',
        navRQ: 'RQ',
        subtitle: '라벨링, 선거, 비동의 딥페이크, 서비스/플랫폼 책임, 처벌 법제화 상태를 문장 단위로 비교합니다.',
        cCountry: '국가',
        cLabel: '라벨링',
        cElection: '선거 관련',
        cNon: '동의 없는 딥페이크',
        cProvider: '서비스/플랫폼 책임',
        cPenalty: '처벌 법제화',
        strong: '강함',
        medium: '중간',
        weak: '약함',
        unclear: '불명확',
        nolaw: '법률 없음',
        empty: '상태 데이터가 없습니다.'
      },
      en: {
        title: 'Detailed Cross-country Status Table',
        lang: 'Language',
        navHome: 'Home',
        navCountries: 'Countries',
        navCompare: 'Compare',
        navPenalties: 'Penalties',
        navRQ: 'RQ',
        subtitle: 'Compare full-text status notes across labeling, election, non-consensual deepfakes, provider/platform liability, and penalties.',
        cCountry: 'Country',
        cLabel: 'Labeling',
        cElection: 'Election-related',
        cNon: 'Non-consensual deepfake',
        cProvider: 'Provider/platform liability',
        cPenalty: 'Penalty codification',
        strong: 'Strong',
        medium: 'Medium',
        weak: 'Weak',
        unclear: 'Unclear',
        nolaw: 'No Law',
        empty: 'No status data available.'
      }
    };

    const COUNTRY = {
      ko: { '한국': '한국', '영국': '영국', '호주': '호주', 'EU': 'EU', '미국': '미국', '중국': '중국', '사우디': '사우디아라비아', '독일': '독일', '프랑스': '프랑스', '인도': '인도', '파키스탄': '파키스탄', '아랍에미리에이트': '아랍에미리에이트', '싱가폴': '싱가폴', '아르헨티나': '아르헨티나' },
      en: { '한국': 'Korea', '영국': 'United Kingdom', '호주': 'Australia', 'EU': 'EU', '미국': 'United States', '중국': 'China', '사우디': 'Saudi Arabia', '독일': 'Germany', '프랑스': 'France', '인도': 'India', '파키스탄': 'Pakistan', '아랍에미리에이트': 'United Arab Emirates', '싱가폴': 'Singapore', '아르헨티나': 'Argentina' }
    };

    const host = document.getElementById('host');
    const langSel = document.getElementById('lang');
    const tabHomeEl = document.getElementById('tabHome');
    const tabCountriesEl = document.getElementById('tabCountries');
    const tabCompareEl = document.getElementById('tabCompare');
    const tabPenaltiesEl = document.getElementById('tabPenalties');
    const tabRQEl = document.getElementById('tabRQ');

    const escapeHtml = (s) => (s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    function lang() { return langSel.value === 'en' ? 'en' : 'ko'; }
    function pillText(level) {
      const t = TXT[lang()];
      if (level === 'strong') return t.strong;
      if (level === 'mid') return t.medium;
      if (level === 'weak') return t.weak;
      if (level === 'unclear') return t.unclear;
      if (level === 'nolaw') return t.nolaw;
      return '-';
    }

    function applyText() {
      const t = TXT[lang()];
      document.documentElement.lang = lang();
      document.getElementById('title').textContent = t.title;
      document.getElementById('langLabel').textContent = t.lang + ':';
      tabHomeEl.textContent = t.navHome;
      tabCountriesEl.textContent = t.navCountries;
      tabCompareEl.textContent = t.navCompare;
      tabPenaltiesEl.textContent = t.navPenalties;
      tabRQEl.textContent = t.navRQ;
      document.getElementById('subtitle').textContent = t.subtitle;
    }

    async function render() {
      const t = TXT[lang()];
      const labels = COUNTRY[lang()] || {};
      const res = await fetch(`/api/statuses?lang=${encodeURIComponent(lang())}`);
      if (!res.ok) {
        host.innerHTML = `<p>${escapeHtml(t.empty)}</p>`;
        return;
      }
      const data = await res.json();
      const cell = (text, level) => `<div class="status-text">${escapeHtml(text || '')}<span class="pill pill-${escapeHtml(level || 'na')}">${escapeHtml(pillText(level || 'na'))}</span></div>`;
      const rows = (data.statuses || []).map((s) => `<tr>
        <td>${escapeHtml(labels[s.country] || s.country)}</td>
        <td>${cell(s.labeling, s.labeling_level)}</td>
        <td>${cell(s.election, s.election_level)}</td>
        <td>${cell(s.non_consensual, s.non_consensual_level)}</td>
        <td>${cell(s.provider_liability, s.provider_liability_level)}</td>
        <td>${cell(s.penalty, s.penalty_level)}</td>
      </tr>`).join('');

      host.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>${escapeHtml(t.cCountry)}</th>
              <th>${escapeHtml(t.cLabel)}</th>
              <th>${escapeHtml(t.cElection)}</th>
              <th>${escapeHtml(t.cNon)}</th>
              <th>${escapeHtml(t.cProvider)}</th>
              <th>${escapeHtml(t.cPenalty)}</th>
            </tr>
          </thead>
          <tbody>${rows || `<tr><td colspan="6">${escapeHtml(t.empty)}</td></tr>`}</tbody>
        </table>
      `;
    }

    langSel.addEventListener('change', async () => {
      applyText();
      await render();
    });

    (async () => {
      applyText();
      await render();
    })();
  </script>
</body>
</html>
