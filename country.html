<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국가 상세 페이지</title>
  <link rel="stylesheet" href="/assets/palette.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Poppins", "Noto Sans KR", "Segoe UI", "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
      color: #0f172a;
      overflow-y: scroll;
      background:
        radial-gradient(circle at top left, rgba(15,94,234,0.12), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(148,163,184,0.18), transparent 22%),
        linear-gradient(180deg, #f8fbff 0%, #f8fafc 44%, #ffffff 100%);
    }
    .wrap { max-width: var(--layout-page-max-width); margin: 0 auto; padding: var(--layout-page-padding-top) var(--layout-page-padding-x) var(--layout-page-padding-bottom); }
    .card {
      background: linear-gradient(135deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.84) 100%);
      border: 1px solid #d9e3f2;
      border-radius: 24px;
      padding: var(--layout-card-padding);
      box-shadow: 0 22px 60px rgba(15,23,42,0.08);
      overflow: hidden;
      position: relative;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 0 0 14px;
      padding: 0;
      position: relative;
    }
    .head-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      width: auto;
      justify-content: flex-start;
      position: relative;
    }
    .title-stack {
      display: grid;
      gap: 4px;
    }
    .page-kicker {
      margin: 0;
      color: #0f5eea;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .page-subtitle {
      margin: 0;
      color: #475569;
      font-size: 13px;
      line-height: 1.5;
    }
    h1 { margin: 0; font-size: 28px; line-height: 1.06; letter-spacing: -.04em; text-align: left; color: #0f172a; }
    .langbox {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid #d6deea;
      background: rgba(255,255,255,0.82);
    }
    .detail-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 12px;
      padding: 0 0 2px;
    }
    .d-tab {
      border: 1px solid #d6deea;
      background: #fff;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
    }
    .d-tab.active {
      background: var(--accent-soft);
      border-color: var(--accent-line);
      color: var(--accent-strong);
    }
    select {
      font-size: 14px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid #d6deea;
      background: #fff;
      color: #0f172a;
    }
    a.link { color: var(--accent); text-decoration: none; font-weight: 600; }
    a.link:hover { text-decoration: underline; }
    .back-btn {
      font-size: 14px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid #d6deea;
      background: rgba(255,255,255,0.86);
      color: #0f172a;
      text-decoration: none;
      font-weight: 700;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
      position: static;
      transform: none;
    }
    .back-btn:hover {
      background: #f8fbff;
      border-color: #bcd0f3;
      color: #0f5eea;
      text-decoration: none;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .panel {
      border: 1px solid #d9e3f2;
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 10px 28px rgba(15,23,42,0.05);
      min-height: 0;
    }
    .panel h2 {
      margin: 0 0 6px;
      font-size: 14px;
      color: #334155;
    }
    .section-chip {
      margin: 0 auto 10px;
      width: fit-content;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .02em;
      color: var(--doc-act-fg);
      border: 1px solid var(--accent-line);
      border-radius: 999px;
      padding: 5px 10px;
      background: linear-gradient(180deg, var(--surface) 0%, var(--accent-soft) 100%);
      box-shadow: 0 3px 10px rgba(37, 99, 235, 0.16);
    }
    .doc-list { display: grid; gap: 12px; }
    .doc-list > section {
      display: grid;
      gap: 10px;
    }
    .doc-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .mode-label { font-size: 12px; color: var(--sub); font-weight: 700; }
    .mode-switch { display: inline-flex; gap: 6px; flex-wrap: wrap; }
    .mode-btn {
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      padding: 6px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--sub);
      cursor: pointer;
    }
    .mode-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent-line);
      color: var(--accent-strong);
    }
    .search-input {
      width: 100%;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #d6deea;
      background: #fff;
      margin-bottom: 6px;
    }
    .timeline-wrap {
      border: 0;
      border-radius: 0;
      padding: 0;
      background: transparent;
      margin-bottom: 8px;
      position: relative;
    }
    .timeline-compare-head { display: none; }
    .timeline-compare-actions { display: none; }
    .timeline-compare-stack {
      margin-top: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      gap: 6px;
      padding-left: 0;
    }
    .timeline-compare-slot {
      position: absolute;
      left: 0;
      top: calc(44% + 44px);
      transform: translateX(calc(-100% - 5px));
      width: auto;
      display: flex;
      justify-content: center;
    }
    .timeline-compare-controls {
      display: none;
      align-items: center;
      gap: 6px;
      width: 100%;
      justify-content: center;
    }
    .timeline-compare-stack .timeline-compare-toggle,
    .timeline-compare-stack .vtl-select {
      margin: 0 auto;
    }
    .timeline-compare-toggle {
      font-size: 12px;
      font-weight: 700;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      background: linear-gradient(180deg, #ffffff 0%, #eef4ff 100%);
      color: #1e3a8a;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(29, 78, 216, 0.12);
    }
    .timeline-compare-toggle:hover { background: #eef2ff; border-color: #b7ccff; color: #123d9a; }
    .timeline-compare-close {
      width: 28px;
      height: 24px;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #475569;
      font-size: 14px;
      line-height: 1;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }
    .timeline-compare-close:hover {
      border-color: #b7ccff;
      color: #123d9a;
      background: #eef2ff;
    }
    .timeline-unified {
      --left-rail: 170px;
      border: 1px solid #d8dee8;
      border-radius: 9px;
      background:
        radial-gradient(120% 90% at 0% 0%, rgba(59,130,246,.08) 0%, transparent 45%),
        linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
      padding: 10px 10px 12px;
      min-width: 0;
      overflow: auto;
    }
    .timeline-global {
      position: relative;
      min-height: 228px;
      min-width: 0;
      width: min(860px, calc(100% - var(--left-rail)));
      margin: 0 0 0 var(--left-rail);
      padding: 6px 0;
    }
    .timeline-global::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 4px;
      bottom: 4px;
      border-left: 1px dashed #cdd6df;
      opacity: 0.75;
      pointer-events: none;
    }
    .timeline-global-axis {
      position: absolute;
      left: 0;
      right: 0;
      top: 44%;
      transform: translateY(-50%);
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, #cfd8e3 0%, #94a3b8 50%, #cfd8e3 100%);
    }
    .timeline-lane-label {
      position: absolute;
      left: 0;
      transform: translateX(calc(-100% - 5px));
      font-size: 12px;
      font-weight: 800;
      line-height: 1.15;
      color: #475569;
      white-space: nowrap;
      width: auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      text-align: center;
      background: transparent;
      border: 0;
      box-shadow: none;
      overflow: visible;
    }
    .timeline-lane-label .lane-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      flex: 0 0 auto;
    }
    .timeline-lane-label .lane-name {
      display: inline-block;
      max-width: none;
      overflow: visible;
      text-overflow: clip;
      white-space: nowrap;
      vertical-align: middle;
      text-align: center;
    }
    .timeline-lane-label.top {
      top: calc(44% - 40px);
    }
    .timeline-lane-label.bottom {
      top: calc(44% + 20px);
      transform: translateX(calc(-100% - 11px));
    }
    .timeline-lane-label.bottom::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: -18px;
      border-top: 1px dashed #cdd6df;
      opacity: 0.75;
      pointer-events: none;
    }
    .timeline-lane-label.compare {
      top: calc(44% + 88px);
      transform: translateX(calc(-100% - 11px));
    }
    .timeline-axis-label {
      position: absolute;
      right: 0;
      top: 44%;
      transform: translate(104%, -50%);
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      line-height: 1;
    }
    .timeline-gap {
      position: absolute;
      top: 44%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      color: #64748b;
      font-weight: 800;
      background: #fff;
      border: 1px dashed #cfd8e3;
      border-radius: 999px;
      padding: 0 5px;
      line-height: 1.1;
    }
    .timeline-pin {
      position: absolute;
      transform: translateX(-50%);
      width: 118px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      pointer-events: none;
    }
    .timeline-pin.up {
      bottom: calc(50% + 8px);
    }
    .timeline-pin.down {
      top: calc(44% + 8px);
    }
    .timeline-pin.country {
      bottom: calc(56% + 36px);
    }
    .timeline-pin.global {
      top: calc(44% + 10px);
      z-index: 3;
    }
    .timeline-pin.compare {
      top: calc(44% + 66px);
      z-index: 1;
    }
    .timeline-pin-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      border: 1px solid transparent;
      box-shadow: 0 0 0 2px #fff;
      pointer-events: auto;
    }
    .timeline-pin-dot.in_force { background:#16a34a; border-color:#15803d; }
    .timeline-pin-dot.proposed { background:#f59e0b; border-color:#d97706; }
    .timeline-pin-dot.guidelines { background:#3b82f6; border-color:#1d4ed8; }
    .timeline-pin-dot.unknown { background:#94a3b8; border-color:#64748b; }
    .timeline-pin-dot.mixed { background:#8b5cf6; border-color:#7c3aed; }
    .timeline-pin-year {
      font-size: 12px;
      font-weight: 800;
      color: #334155;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      pointer-events: auto;
    }
    .timeline-pin-desc {
      font-size: 11px;
      line-height: 1;
      border-radius: 999px;
      border: 1px solid #d5deea;
      background: #ffffff;
      color: #334155;
      padding: 3px 7px;
      white-space: nowrap;
      box-shadow: none;
      pointer-events: auto;
    }
    .timeline-pin-notes {
      display: grid;
      gap: 2px;
      max-width: 156px;
      color: #94a3b8;
      font-size: 10px;
      line-height: 1.15;
      text-align: center;
      pointer-events: none;
    }
    .timeline-pin-notes .note-line {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      margin: 1px 0;
    }
    .timeline-pin-stem {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      border-left: 2px dashed #cbd5e1;
      opacity: 0.7;
      pointer-events: none;
    }
    .timeline-pin.compare .timeline-pin-stem {
      top: -56px;
      height: 56px;
    }
    .timeline-year-tick {
      position: absolute;
      top: calc(44% - 22px);
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 800;
      color: #334155;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      background: #fff;
      padding: 0 3px;
      border-radius: 4px;
    }
    .vtl-select {
      min-width: 72px;
      max-width: 72px;
      width: 72px;
      font-size: 12px;
      padding: 5px 6px;
      border-radius: 9px;
      border: 1px solid #bfd3ff;
      background: #fff;
      color: #334155;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
    }
    .timeline-flow {
      display: none;
      margin: 0 0 8px;
      font-size: 11px;
      color: #6b7280;
    }
    .timeline-rows { padding: 0; }
    .timeline-canvas { position: relative; padding: 2px 4px 0; min-height: 122px; }
    .timeline-axis {
      position: absolute;
      left: 4px;
      right: 4px;
      top: 32px;
      height: 2px;
      border-radius: 999px;
      background: #c5cfde;
    }
    .timeline-step {
      position: absolute;
      top: 4px;
      transform: translateX(-50%);
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .timeline-step.is-start { transform: translateX(0); align-items: flex-start; }
    .timeline-step.is-end { transform: translateX(-100%); align-items: flex-end; }
    .timeline-year-label {
      font-size: 10px;
      color: #6b7280;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .timeline-node {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      font-size: 9px;
      font-weight: 700;
      line-height: 1;
      padding: 4px 6px;
      border: 1px solid transparent;
      white-space: nowrap;
      background: #eef0f3;
      color: #374151;
    }
    .timeline-node::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: calc(100% + 4px);
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 0 2px #fff;
      opacity: .85;
    }
    .timeline-cnt {
      margin-left: 4px;
      font-size: 8px;
      font-weight: 800;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.08);
      color: inherit;
    }
    .timeline-node.is-current {
      box-shadow: 0 0 0 1px #2563eb inset;
      font-weight: 800;
    }
    .timeline-point-meta {
      display: grid;
      gap: 2px;
      width: 108px;
    }
    .timeline-mini {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      border-radius: 6px;
      padding: 2px 4px;
      border: 1px solid transparent;
      line-height: 1;
      white-space: nowrap;
      font-size: 9px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .timeline-mini-if { background:#eaf7ee; color:#166534; border-color:#b7e1c2; }
    .timeline-mini-pr { background:#fff6df; color:#8a5a00; border-color:#efd9a0; }
    .timeline-mini-gl { background:#e8f1ff; color:#1e3a8a; border-color:#b9d1ff; }
    .timeline-mini-rv { background:#eef0f3; color:#374151; border-color:#d1d5db; }
    .timeline-stage {
      display: inline-block;
      min-width: 68px;
      text-align: center;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      padding: 4px 6px;
      border: 1px solid transparent;
      white-space: nowrap;
      margin-left: 6px;
      vertical-align: middle;
    }
    .timeline-stage-inforce { background: #eaf7ee; color: #166534; border-color: #b7e1c2; }
    .timeline-stage-proposed { background: #fff6df; color: #8a5a00; border-color: #efd9a0; }
    .timeline-stage-guidelines { background: #e8f1ff; color: #1e3a8a; border-color: #b9d1ff; }
    .timeline-stage-unknown { background: #eef0f3; color: #374151; border-color: #d1d5db; }
    .timeline-node-in_force { background: #eaf7ee; color: #166534; border-color: #b7e1c2; }
    .timeline-node-proposed { background: #fff6df; color: #8a5a00; border-color: #efd9a0; }
    .timeline-node-guidelines { background: #e8f1ff; color: #1e3a8a; border-color: #b9d1ff; }
    .timeline-node-unknown { background: #eef0f3; color: #374151; border-color: #d1d5db; }
    .timeline-node-mixed {
      background: repeating-linear-gradient(135deg, #f3e8ff 0 6px, #ede9fe 6px 12px);
      color: #5b21b6;
      border-color: #c4b5fd;
    }
    .doc-item {
      border: 1px solid var(--line);
      border-left: 4px solid transparent;
      border-radius: 10px;
      padding: 9px 10px;
      background: #fff;
    }
    .doc-item.is-active-document {
      border-color: #93c5fd;
      box-shadow: 0 0 0 1px #bfdbfe inset;
    }
    .doc-stage-inforce { background: linear-gradient(90deg, var(--status-strong-bg) 0 16px, var(--surface) 16px 100%); border-color: var(--status-strong-line); }
    .doc-stage-proposed { background: linear-gradient(90deg, var(--status-mid-bg) 0 16px, var(--surface) 16px 100%); border-color: var(--status-mid-line); }
    .doc-stage-guidelines { background: linear-gradient(90deg, var(--doc-act-bg) 0 16px, var(--surface) 16px 100%); border-color: var(--doc-act-line); }
    .doc-stage-nolaw { background: linear-gradient(90deg, var(--status-weak-bg) 0 16px, var(--surface) 16px 100%); border-color: var(--status-weak-line); }
    .doc-stage-unknown { background: linear-gradient(90deg, var(--status-na-bg) 0 16px, var(--surface) 16px 100%); border-color: var(--status-na-line); }
    .doc-item.doc-type-report.doc-stage-inforce,
    .doc-item.doc-type-report.doc-stage-proposed,
    .doc-item.doc-type-report.doc-stage-guidelines,
    .doc-item.doc-type-report.doc-stage-nolaw,
    .doc-item.doc-type-report.doc-stage-unknown {
      background: linear-gradient(90deg, var(--doc-other-bg) 0 16px, var(--surface) 16px 100%);
      border-color: var(--doc-other-line);
    }
    .doc-type-law { border-left-color: var(--doc-act-bar); }
    .doc-type-draft { border-left-color: var(--status-mid-line); }
    .doc-type-guidance { border-left-color: var(--doc-guide-bar); }
    .doc-type-report { border-left-color: var(--doc-other-bar); }
    .doc-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .doc-title-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1 1 auto;
      min-width: 0;
    }
    .doc-name {
      font-size: 12px;
      margin: 0;
      flex: 1 1 auto;
      min-width: 0;
      word-break: break-word;
      line-height: 1.3;
      font-weight: 600;
    }
    .tag {
      display: inline-block;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      padding: 4px 6px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .tag-law { background: var(--doc-act-bg); color: var(--doc-act-fg); border-color: var(--doc-act-line); }
    .tag-draft { background: var(--status-mid-bg); color: var(--status-mid-fg); border-color: var(--status-mid-line); }
    .tag-guidance { background: var(--doc-guide-bg); color: var(--doc-guide-fg); border-color: var(--doc-guide-line); }
    .tag-report { background: var(--doc-other-bg); color: var(--doc-other-fg); border-color: var(--doc-other-line); }
    .tag-lang { background: #f8f8f8; color: #4b5563; border-color: #d1d5db; }
    .lawstage-inforce { background: var(--status-strong-bg); color: var(--status-strong-fg); border-color: var(--status-strong-line); }
    .lawstage-proposed { background: var(--status-mid-bg); color: var(--status-mid-fg); border-color: var(--status-mid-line); }
    .lawstage-guidelines { background: transparent; color: #4b5563; border-color: #d1d5db; }

  <main class="wrap">

    const escapeHtml = (s) => (s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
    function renderInlineMd(text) {
      let html = escapeHtml(text || '');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      return html;

    function resolveWordcloudCountryKey() {
      const mapped = WORDCLOUD_COUNTRY_KEYS[country] || country;
      const buckets = [
        wordcloudPayload && wordcloudPayload.by_country_text_kor,
        wordcloudPayload && wordcloudPayload.by_country_text,
      ];
      for (const bucket of buckets) {
        if (!bucket || typeof bucket !== 'object') continue;
        if (bucket[mapped]) return mapped;
        if (bucket[country]) return country;
      }
      return mapped;
    }

    function resolveAnalysisCountryKey(payload) {
      const mapped = WORDCLOUD_COUNTRY_KEYS[country] || country;
      const countries = payload && payload.countries && typeof payload.countries === 'object' ? payload.countries : {};
      if (countries[mapped]) return mapped;
      if (countries[country]) return country;
      const target = String(mapped || country).toLowerCase();
      return Object.keys(countries).find((key) => key.toLowerCase() === target) || mapped;
    }

    function currentCountryWordcloudBucket() {
      if (!wordcloudPayload) return null;
      const key = resolveWordcloudCountryKey();
      const field = currentWordcloudView === 'source' ? 'by_country_text' : 'by_country_text_kor';
      const bucket = wordcloudPayload[field] || {};
      return bucket[key] || null;
    }

      Array.from(wordcloudSwitchEl.querySelectorAll('[data-wordcloud-view]')).forEach((btn) => {
        btn.classList.toggle('active', btn.getAttribute('data-wordcloud-view') === currentWordcloudView);
      });

      let bucket = currentCountryWordcloudBucket();
      let fallbackToSource = false;
      let terms = bucket && Array.isArray(bucket.terms) ? bucket.terms.slice(0, 58) : [];
      if (!terms.length && currentWordcloudView === 'kor' && wordcloudPayload) {
        const key = resolveWordcloudCountryKey();
        const sourceBucket = (wordcloudPayload.by_country_text || {})[key] || null;
        const sourceTerms = sourceBucket && Array.isArray(sourceBucket.terms) ? sourceBucket.terms.slice(0, 58) : [];
        if (sourceTerms.length) {
          bucket = sourceBucket;
          terms = sourceTerms;
          fallbackToSource = true;
        }
      }
      const rows = bucket && Number.isFinite(Number(bucket.rows)) ? Number(bucket.rows) : 0;
      wordcloudMetaEl.textContent = terms.length
        ? `${t.wordcloudMeta.replace('{rows}', rows.toLocaleString(lang() === 'ko' ? 'ko-KR' : 'en-US'))}${fallbackToSource ? ` · ${t.wordcloudSourceFallback}` : ''}`

        if (country !== '한국' && hasKo) opts.push({ v: 'ko', l: t.docViewKorean });
        opts.push({ v: 'all', l: t.docViewAll });
      } else if (mode === 'english_primary') {
        opts.push({ v: 'en', l: t.docViewEnglish });
      } else {
        opts.push({ v: 'all', l: t.docViewAll });
      }
      const values = opts.map((o) => o.v);
      currentDocsMode = values.includes(currentDocsMode) ? currentDocsMode : opts[0].v;
      docsModeSwitchEl.innerHTML = opts.map((o) => `<button type="button" class="mode-btn${o.v === currentDocsMode ? ' active' : ''}" data-mode="${escapeHtml(o.v)}">${escapeHtml(o.l)}</button>`).join('');
    }

    function normalizeLawStage(raw) {
      const vv = String(raw || '').toLowerCase().replace(/\s+/g, '_');
      const needs_review = vv.includes('needs_review');
      const v = vv.replace('_needs_review', '');
      if (v.includes('in_force') || v === 'inforce') return { cls: 'lawstage-inforce', label: 'In Force', needs_review };
      if (v.includes('proposed') || v.includes('draft')) return { cls: 'lawstage-proposed', label: 'Proposed', needs_review };
      if (v.includes('guideline')) return { cls: 'lawstage-guidelines', label: 'Guidelines', needs_review };
      if (v.includes('no_law') || v === 'nolaw') return { cls: 'lawstage-nolaw', label: 'No Law', needs_review };
      if (v.includes('unknown') || v.includes('needs_review') || v.includes('unclear') || !v.trim()) {
        return { cls: 'lawstage-unknown', label: 'Unknown', needs_review };
      }
      return null;
    }

    function inferDocLawStage(doc) {
      const serverStage = normalizeLawStage(doc.law_stage);
      if (serverStage) return serverStage;
      const type = normalizeDocumentType(doc.document_type);
      if (type === 'official_law_act') return { cls: 'lawstage-inforce', label: 'In Force' };
      if (type === 'draft') return { cls: 'lawstage-proposed', label: 'Proposed' };
      if (type === 'official_guidance_warning' || type === 'official_report_assessment') {
        return { cls: 'lawstage-guidelines', label: 'Guidelines' };
      }
      return { cls: 'lawstage-unknown', label: 'Unknown', needs_review: false };
    }

    function mdToHtml(md, statusObj) {
      const lines = md.split('\n');
      const out = [];
      let inList = false;
      let listTag = '';
      let inPolicyDimensions = false;
      let skipPolicySection = false;
      let firstH1Done = false;
      const close = () => {
        if (inList) {
          out.push(`</${listTag || 'ul'}>`);
          inList = false;
          listTag = '';
        }
      };
      for (const raw of lines) {
        const line = raw.trimEnd();
        if (!line.trim()) { close(); continue; }
        if (line.startsWith('### ')) { close(); out.push('<h3>' + renderInlineMd(line.slice(4)) + '</h3>'); continue; }
        if (line.startsWith('## ')) {
          close();
          const h2 = line.slice(3).trim();
          inPolicyDimensions = (h2 === 'Policy Dimensions' || h2 === '법제화 상태');
          skipPolicySection = inPolicyDimensions;
          if (skipPolicySection) {
            continue;
          }
          out.push('<h2>' + renderInlineMd(h2) + '</h2>');
          continue;
        }
        if (skipPolicySection) {
          continue;
        }
        if (line.startsWith('# ')) {
          close();
          const h1 = line.slice(2);
          if (!firstH1Done) {
            out.push('<h1>' + countryFlagHtml(country) + renderInlineMd(h1) + '</h1>');
            firstH1Done = true;
            continue;
          }
          out.push('<h1>' + renderInlineMd(h1) + '</h1>');
          continue;
        }
        const ordered = line.match(/^\d+\.\s+(.*)$/);
        const bullet = line.match(/^-\s+(.*)$/);
        if (ordered || bullet) {
          const tag = ordered ? 'ol' : 'ul';
          if (!inList || listTag !== tag) {
            close();
            out.push(`<${tag}>`);
            inList = true;
            listTag = tag;
          }
          const content = (ordered ? ordered[1] : bullet[1]) || '';
          let html = renderInlineMd(content);
          if (inPolicyDimensions) {
            const level = policyLevelForLine(content, statusObj);
            if (level !== 'na') {
              html += ` <span class="pill pill-${level} inline-pill">${escapeHtml(pillText(level))}</span>`;
            }
          }
          out.push('<li>' + html + '</li>');
          continue;
        }
        if (/^(Ref\d+:|Evidence\d+:)/.test(line)) { close(); out.push('<p class="evidence">' + renderInlineMd(line) + '</p>'); continue; }
        close(); out.push('<p>' + renderInlineMd(line) + '</p>');
      }
      close();
      return out.join('');
    }
    function dimRecapRows(statusObj) {
      const t = T[lang()];
      if (!statusObj) return '';
      const defs = [
        [t.statusLabeling, statusObj.labeling_level],
        [t.statusElection, statusObj.election_level],
        [t.statusNon, statusObj.non_consensual_level],
        [t.statusProvider, statusObj.provider_liability_level],
        [t.statusPenalty, statusObj.penalty_level],
      ];
      return defs.map(([label, level]) => `<li>${escapeHtml(label)}: <span class="pill pill-${escapeHtml(level || 'na')} inline-pill">${escapeHtml(pillText(level || 'na'))}</span></li>`).join('');
    }

    function setVisible(id, on) {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.display = on ? '' : 'none';
    }

    function setDetailTab(tab) {
      currentDetailTab = tab;
      detailTabButtons.forEach((b) => b.classList.toggle('active', b.getAttribute('data-detail-tab') === tab));

      if (tab === 'documents') {
        leftPanel.style.display = 'none';
        rightPanel.style.display = '';
        return;
      }

      leftPanel.style.display = '';
      rightPanel.style.display = 'none';

      const showSummary = tab === 'summary';
      const showStatus = tab === 'status';
      const showPenalty = tab === 'penalties';

      setVisible('summaryHeader', showSummary);
      setVisible('summary', showSummary);

      setVisible('compareHeader', false);
      setVisible('compareBlock', false);
      setVisible('statusHeader', showStatus);
      setVisible('statusBlock', showStatus);

      setVisible('penaltyHeader', showPenalty);
      const penaltyHead = document.querySelector('.penalty-head');
      if (penaltyHead) penaltyHead.style.display = showPenalty ? '' : 'none';
      setVisible('penaltyBlock', showPenalty);
    }

    function applyText() {
      const t = T[lang()];
      const labels = COUNTRY_LABELS[lang()] || {};
      const countryLabel = labels[country] || country;
      document.documentElement.lang = lang();
      document.getElementById('title').textContent = `${t.title} - ${countryLabel}`;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('langLabel').textContent = t.lang + ':';
      tabSummaryEl.textContent = t.tabSummary;
      tabStatusEl.textContent = t.tabStatus;
      tabDocumentsEl.textContent = t.tabDocuments;
      tabPenaltiesInEl.textContent = t.tabPenalties;
      document.getElementById('backLink').textContent = t.back;
      document.getElementById('docsHeader').textContent = t.docs;
      document.getElementById('docsListHeader').textContent = t.docsCollection;
      renderWordcloud();
      renderGovernanceScores();
      docSearchEl.placeholder = t.docSearchPlaceholder;
      document.getElementById('docsModeLabel').textContent = t.docViewLabel + ':';
      if (timelineCompareSelect && !timelineCompareSelect.options.length) {
        timelineCompareSelect.innerHTML = `<option value="">${escapeHtml(t.timelineComparePick)}</option>`;
      }
      updateDocsModeOptions();
      document.getElementById('summaryHeader').textContent = t.summary;
      document.getElementById('statusHeader').textContent = t.status;
      document.getElementById('compareHeader').textContent = t.compareTitle;
      document.getElementById('penaltyHeader').textContent = t.penaltyTitle;
      document.getElementById('penaltyHint').textContent = t.penaltyNormHint;
      penaltyCsvBtn.textContent = t.penaltyCsv;
      penaltyCsvBtn.href = `/api-static/penalties-normalized-csv/${encodeURIComponent(country)}.${encodeURIComponent(lang())}.csv`;
      document.getElementById('previewHeader').textContent = t.preview;
      setDetailTab(currentDetailTab);
    }

    function renderStatusBlock(statusObj, allStatuses) {
      const t = T[lang()];
      const host = document.getElementById('statusBlock');
      if (!statusObj) {
        host.innerHTML = `<p class="muted">${escapeHtml(t.noStatus)}</p>`;
        return;
      }
      const avgRows = buildDimensionAverages(allStatuses || []);
      const avgMap = new Map(avgRows.map((r) => [r.key, r.avg]));

      const extractRefs = (text) => {
        const m = String(text || '').match(/\((Ref\d+(?:\s*,\s*Ref\d+)*)\)\.?\s*$/);
        return m ? m[1] : '';
      };

      const hintByKey = (key, refs) => {
        let body = '';
        if (key === 'labeling') body = t.hintLabeling;
        if (key === 'election') body = t.hintElection;
        if (key === 'non_consensual') body = t.hintNon;
        if (key === 'provider_liability') body = t.hintProvider;
        if (key === 'penalty') body = t.hintPenalty;
        if (!body) return '';
        if (!refs) return `${t.articleHintPrefix}: ${body}`;
        return `${t.articleHintPrefix}: ${body} (${refs})`;
      };

      const rows = [
        ['labeling', 'labeling_level', t.statusLabeling, statusObj.labeling, statusObj.labeling_level],
        ['election', 'election_level', t.statusElection, statusObj.election, statusObj.election_level],
        ['non_consensual', 'non_consensual_level', t.statusNon, statusObj.non_consensual, statusObj.non_consensual_level],
        ['provider_liability', 'provider_liability_level', t.statusProvider, statusObj.provider_liability, statusObj.provider_liability_level],
        ['penalty', 'penalty_level', t.statusPenalty, statusObj.penalty, statusObj.penalty_level],
      ];
      host.innerHTML = rows.map(([key, avgKey, label, text, level]) => {
        const cs = levelToScore(level);
        const cScore = cs == null ? 0 : cs;
        const aScore = Number(avgMap.get(avgKey) || 0);
        const cw = Math.max(1.5, Math.min(100, (cScore / 4) * 100));
        const aw = Math.max(1.5, Math.min(100, (aScore / 4) * 100));
        const [cc1, cc2] = scoreFillColors(cScore);
        const [ac1, ac2] = scoreFillColors(aScore);
        return `
        <div class="status-item">
          <strong>${escapeHtml(dimensionIcon(key))} ${escapeHtml(label)}</strong><br/>
          ${escapeHtml(text || '')}
          <span class="pill pill-${escapeHtml(level || 'na')} inline-pill">${escapeHtml(pillText(level || 'na'))}</span>
          <div class="status-article-hint">${escapeHtml(hintByKey(key, extractRefs(text)))}</div>
          <div class="status-compare">
            <div class="compare-line">
              <span>${escapeHtml(t.compareCountry)}</span>
              <div class="compare-track"><div class="compare-fill-country" style="width:${cw.toFixed(2)}%;--compare-fill:linear-gradient(90deg,${cc1} 0%,${cc2} 100%);"></div></div>
              <span class="compare-num">${cScore.toFixed(2)}</span>
            </div>
            <div class="compare-line">
              <span>${escapeHtml(t.compareAverage)}</span>
              <div class="compare-track"><div class="compare-fill-avg" style="width:${aw.toFixed(2)}%;--compare-fill:linear-gradient(90deg,${ac1} 0%,${ac2} 100%);"></div></div>
              <span class="compare-num">${aScore.toFixed(2)}</span>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function buildDimensionAverages(allStatuses) {
      const defs = [
        ['labeling_level', T[lang()].statusLabeling],
        ['election_level', T[lang()].statusElection],
        ['non_consensual_level', T[lang()].statusNon],
        ['provider_liability_level', T[lang()].statusProvider],
        ['penalty_level', T[lang()].statusPenalty],
      ];
      return defs.map(([key, label]) => {
        let sum = 0;
        let n = 0;
        for (const s of allStatuses || []) {
          const sc = levelToScore(s[key]);
          if (sc == null) continue;
          sum += sc;
          n += 1;
        }
        return { key, label, avg: n ? (sum / n) : 0 };
      });
    }

    function renderCompareBlock(statusObj, allStatuses) {
      const t = T[lang()];
      const host = document.getElementById('compareBlock');
      if (!statusObj || !Array.isArray(allStatuses) || !allStatuses.length) {
        host.innerHTML = `<p class="muted">${escapeHtml(t.noStatus)}</p>`;
        return;
      }
      const rows = buildDimensionAverages(allStatuses);
      host.innerHTML = `<p class="compare-note">${escapeHtml(t.compareNote)}</p>
        <div class="compare-rows">
          ${rows.map((r) => {
            const countryScore = levelToScore(statusObj[r.key]);
            const cs = countryScore == null ? 0 : countryScore;
            const cw = Math.max(0, Math.min(100, (cs / 4) * 100));
            const aw = Math.max(0, Math.min(100, (r.avg / 4) * 100));
            const [cc1, cc2] = scoreFillColors(cs);
            const [ac1, ac2] = scoreFillColors(r.avg);
            const diff = cs - r.avg;
            const diffText = `${diff >= 0 ? '+' : ''}${diff.toFixed(2)}`;
            const diffCls = diff > 0 ? 'pos' : (diff < 0 ? 'neg' : 'eq');
            return `<div class="compare-row">
              <div class="compare-name">
                <span>${escapeHtml(r.label)}</span>
                <span class="compare-diff ${diffCls}">${escapeHtml(diffText)}</span>
              </div>
              <div class="compare-line">
                <span>${escapeHtml(t.compareCountry)}</span>
                <div class="compare-track"><div class="compare-fill-country" style="width:${Math.max(1.5, cw).toFixed(2)}%;--compare-fill:linear-gradient(90deg,${cc1} 0%,${cc2} 100%);"></div></div>
                <span class="compare-num">${cs.toFixed(2)}</span>
              </div>
              <div class="compare-line">
                <span>${escapeHtml(t.compareAverage)}</span>
                <div class="compare-track"><div class="compare-fill-avg" style="width:${Math.max(1.5, aw).toFixed(2)}%;--compare-fill:linear-gradient(90deg,${ac1} 0%,${ac2} 100%);"></div></div>
                <span class="compare-num">${r.avg.toFixed(2)}</span>
              </div>
            </div>`;
          }).join('')}
        </div>`;
    }

    function fmtFine(row) {
      if (row.fine_min == null && row.fine_max == null) return '-';
      const cur = row.fine_currency ? ` ${row.fine_currency}` : '';
      if (row.fine_min != null && row.fine_max != null) return `${row.fine_min} - ${row.fine_max}${cur}`;
      if (row.fine_max != null) return `<= ${row.fine_max}${cur}`;
      return `>= ${row.fine_min}${cur}`;
    }

    function fmtPrison(row) {
      if (row.imprisonment_min_months == null && row.imprisonment_max_months == null) return '-';
      if (row.imprisonment_min_months != null && row.imprisonment_max_months != null) {
        return `${row.imprisonment_min_months}-${row.imprisonment_max_months} months`;
      }
      if (row.imprisonment_max_months != null) return `<= ${row.imprisonment_max_months} months`;
      return `>= ${row.imprisonment_min_months} months`;
    }

    async function loadPenalties() {
      const t = T[lang()];
      const host = document.getElementById('penaltyBlock');
      if (!country) {
        host.innerHTML = `<p class="muted">${escapeHtml(t.noCountry)}</p>`;
        return;
      }
      const res = await fetch(`/api-static/penalties-normalized/${encodeURIComponent(country)}.${encodeURIComponent(lang())}.json`);
      if (!res.ok) {
        host.innerHTML = `<p class="muted">${escapeHtml(t.noPenalty)}</p>`;
        return;
      }
      const data = await res.json();
      const items = data.penalties || [];
      if (!items.length) {
        host.innerHTML = `<p class="muted"><span class="tag lawstage-nolaw">No Law</span> ${escapeHtml(t.noPenalty)}</p>`;
        return;
      }
      const channelLabel = (v) => {
        const x = String(v || '').toLowerCase();
        if (x === 'criminal') return lang() === 'ko' ? '형사' : 'Criminal';
        if (x === 'administrative') return lang() === 'ko' ? '행정' : 'Administrative';
        if (x === 'mixed') return lang() === 'ko' ? '혼합' : 'Mixed';
        if (x === 'other') return lang() === 'ko' ? '기타' : 'Other';
        return lang() === 'ko' ? '불명확' : 'Unknown';
      };
      const statusLabel = (v) => {
        const x = String(v || '').toLowerCase();
        if (x === 'in_force') return 'In Force';
        if (x === 'proposed') return 'Proposed';
        if (x === 'guidelines') return 'Guidelines';
        if (x === 'no_law') return 'No Law';
        return 'Unknown';
      };
      const rows = items.map((p) => `<tr>
        <td>${escapeHtml(p.offense_label || '')}</td>
        <td>${escapeHtml(p.deepfake_scope || '')}</td>
        <td>${escapeHtml(channelLabel(p.sanction_channel))}</td>
        <td>${(() => { const s = normalizeLawStage(p.effective_status) || { cls: 'lawstage-unknown', label: statusLabel(p.effective_status), needs_review: true }; return `<span class="tag ${escapeHtml(s.cls)}">${escapeHtml(s.label)}</span>${s.needs_review ? ` <span class="tag tag-review">${escapeHtml(t.reviewNeeded)}</span>` : ''}`; })()}</td>
        <td class="mono">${escapeHtml(p.law_id || '')}</td>
        <td>${escapeHtml(p.fine_range || '-')}</td>
        <td>${escapeHtml(p.prison_range_months || '-')}</td>
        <td>${escapeHtml(p.aggravation || '')}</td>
        <td>${escapeHtml(p.aggravated_penalty || '')}</td>
        <td>${escapeHtml((p.refs || []).join(', '))}</td>
        <td>${escapeHtml(p.last_verified_at || '')}</td>
      </tr>`).join('');
      host.innerHTML = `<table class="penalty-table">
        <thead>
          <tr>
            <th>${escapeHtml(t.pOffense)}</th>
            <th>${escapeHtml(t.pScope)}</th>
            <th>${escapeHtml(t.pType)}</th>
            <th>${escapeHtml(t.pStatus)}</th>
            <th>${escapeHtml(t.pLaw)}</th>
            <th>${escapeHtml(t.pFine)}</th>
            <th>${escapeHtml(t.pPrison)}</th>
            <th>${escapeHtml(t.pAggrCond)}</th>
            <th>${escapeHtml(t.pAggrPen)}</th>
            <th>${escapeHtml(t.pRefs)}</th>
            <th>${escapeHtml(t.pVerified)}</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    async function loadSummary() {
      const t = T[lang()];
      const el = document.getElementById('summary');
      if (!country) {
        document.getElementById('statusBlock').innerHTML = `<p class="muted">${escapeHtml(t.noCountry)}</p>`;
        el.textContent = t.noCountry;
        return;
      }
      el.classList.add('muted');
      el.textContent = t.loading;
      const res = await fetch(`/api-static/summary/${encodeURIComponent(country)}.${encodeURIComponent(lang())}.md`);
      if (!res.ok) { el.textContent = t.noDocs; return; }
      const md = await res.text();
      const stRes = await fetch(`/api-static/statuses.${encodeURIComponent(lang())}.json`);
      let statusObj = null;
      let allStatuses = [];
      if (stRes.ok) {
        const stData = await stRes.json();
        allStatuses = stData.statuses || [];
        statusObj = allStatuses.find((s) => s.country === country) || null;
      }
      renderStatusBlock(statusObj, allStatuses);
      el.classList.remove('muted');
      const dimFooter = `<section class="summary-dim-footer"><h3>${escapeHtml(T[lang()].summaryDimTitle)}</h3><p class="summary-dim-desc">${escapeHtml(T[lang()].summaryDimDesc)}</p><ul>${dimRecapRows(statusObj)}</ul></section>`;
      el.innerHTML = mdToHtml(md, statusObj) + dimFooter;
    }

    async function loadDashboardTimelineData() {
      try {
        const res = await fetch('/api-static/dashboard-summary.json');
        if (!res.ok) throw new Error('failed');
        const json = await res.json();
        dashboardSummary = json.summary || {};
      } catch (_) {
        dashboardSummary = {};
      }
      const agg = {};
      Object.keys(dashboardSummary || {}).forEach((c) => {
        const tl = (dashboardSummary[c] && dashboardSummary[c].timeline) || {};
        Object.keys(tl).forEach((yk) => {
          const y = Number(yk);
          if (!Number.isFinite(y)) return;
          if (!agg[y]) agg[y] = { in_force: 0, proposed: 0, guidelines: 0, unknown: 0 };
          const r = normalizeTimelineRow(tl[yk]);
          agg[y].in_force += r.in_force;
          agg[y].proposed += r.proposed;
          agg[y].guidelines += r.guidelines;
          agg[y].unknown += r.unknown;
        });
      });
      globalTimelineAgg = agg;
    }

    async function loadDocs() {
      const t = T[lang()];
      const host = document.getElementById('docList');
      if (!country) { host.innerHTML = `<p class="muted">${escapeHtml(t.noCountry)}</p>`; return; }
      host.innerHTML = `<p class="muted">${escapeHtml(t.loading)}</p>`;
      await loadDashboardTimelineData();
      const res = await fetch(`/api-static/documents/${encodeURIComponent(country)}.json`);
      if (!res.ok) { host.innerHTML = `<p class="muted">${escapeHtml(t.noDocs)}</p>`; return; }
      const data = await res.json();
      docsCache = data.documents || [];
      updateDocsModeOptions();
      renderDocsList(selectVisibleDocs(docsCache));
    }

    if (docsModeSwitchEl) {
      docsModeSwitchEl.addEventListener('click', (ev) => {
        const btn = ev.target.closest('button[data-mode]');
        if (!btn) return;
        const mode = btn.getAttribute('data-mode') || 'all';
        currentDocsMode = mode;
        updateDocsModeOptions();
        renderDocsList(selectVisibleDocs(docsCache));
      });
    }
    detailTabButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        const tab = btn.getAttribute('data-detail-tab') || 'summary';
        setDetailTab(tab);
      });
    });
    if (docSearchEl) {
      docSearchEl.addEventListener('input', () => {
        renderDocsList(selectVisibleDocs(docsCache));
      });
    }
    if (wordcloudSwitchEl) {
      wordcloudSwitchEl.addEventListener('click', (ev) => {
        const btn = ev.target.closest('button[data-wordcloud-view]');
        if (!btn) return;
        currentWordcloudView = btn.getAttribute('data-wordcloud-view') === 'source' ? 'source' : 'kor';
        renderWordcloud();
      });
    }

    langSel.addEventListener('change', async () => {
      applyText();
      await loadSummary();
      await loadPenalties();
      await loadDocs();
    });

    (async () => {
      applyText();
      await loadWordcloud();
      await loadGovernanceScores();
      await loadSummary();
      await loadPenalties();
      await loadDocs();
    })();
  </script>
