  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Poppins","Noto Sans KR","Segoe UI",sans-serif;
      color: #0f172a;
      background:
        radial-gradient(circle at top left, rgba(15,94,234,0.12), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(148,163,184,0.18), transparent 22%),
        linear-gradient(180deg, #f8fbff 0%, #f8fafc 44%, #ffffff 100%);
    }
    .wrap {
      max-width: var(--layout-page-max-width);
      margin: 0 auto;
      padding: var(--layout-page-padding-top) var(--layout-page-padding-x) var(--layout-page-padding-bottom);
    }
    .card {
      background: linear-gradient(135deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.84) 100%);
      border: 1px solid #d9e3f2;
      border-radius: 24px;
      padding: var(--layout-card-padding);
      box-shadow: 0 22px 60px rgba(15,23,42,0.08);
      overflow: hidden;
    }
    .shell {
      display: grid;
      grid-template-columns: var(--layout-sidebar-width) minmax(0, 1fr);
      gap: var(--layout-shell-gap);
      align-items: start;
    }
    .sidebar {
      position: sticky;
      top: 24px;
      display: grid;
      gap: 14px;
    }
    .sidebar-card {
      border: 1px solid #d9e3f2;
      border-radius: 20px;
      background: rgba(255,255,255,0.88);
      padding: 18px;
      box-shadow: 0 10px 28px rgba(15,23,42,0.05);
    }
    .sidebar-kicker {
      margin: 0 0 8px;
      color: #0f5eea;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.04;
      letter-spacing: -.05em;
    }
    .ctrl {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid #d6deea;
      background: rgba(255,255,255,0.82);
      width: fit-content;
    }
    .global-tabs, .side-links {
      display: grid;
      gap: 8px;
    }
    .g-tab, .side-link {
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--sub);
    }
    .g-tab.active {
      background: var(--accent-soft);
      border-color: var(--accent-line);
      color: var(--accent-strong);
    }
    .content {
      display: grid;
      gap: 18px;
      min-width: 0;
    }
    .hero {
      display: grid;
      gap: 14px;
      padding: 24px;
      border: 1px solid #d9e3f2;
      border-radius: 22px;
      background:
        radial-gradient(circle at top right, rgba(15,94,234,0.10), transparent 26%),
        linear-gradient(135deg, rgba(255,255,255,0.94) 0%, rgba(247,250,255,0.88) 100%);
      box-shadow: 0 10px 28px rgba(15,23,42,0.05);
    }
    .eyebrow {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef4ff;
      border: 1px solid #c9d8fa;
      color: #17407d;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .hero-copy {
      max-width: 64ch;
    }
    .hero-copy p, .section-intro, .muted {
      margin: 0;
      color: #475569;
      font-size: 14px;
      line-height: 1.72;
    }
    .badge-row, .doc-grid, .step-grid, .command-grid, .axis-grid {
      display: grid;
      gap: 12px;
    }
    .badge-row {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    .doc-card, .step-card, .command-card, .table-block, .axis-card {
      border: 1px solid #d9e3f2;
      border-radius: 20px;
      background: rgba(255,255,255,0.90);
      box-shadow: 0 10px 28px rgba(15,23,42,0.05);
    }
    .doc-card {
      padding: 16px;
      display: grid;
      gap: 8px;
    }
    .doc-card strong {
      font-size: 16px;
      letter-spacing: -.02em;
    }
    .chip {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .chip.core {
      background: #eaf7ee;
      color: #166534;
      border: 1px solid #b7e1c2;
    }
    .chip.context {
      background: #fff4e5;
      color: #9a3412;
      border: 1px solid #fed7aa;
    }
    .section-head {
      display: grid;
      gap: 6px;
      margin-bottom: 2px;
    }
    .section-head h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -.04em;
    }
    .step-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .axis-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .step-card {
      padding: 18px;
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .step-no {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #0f5eea;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 10px 18px rgba(15,94,234,.22);
    }
    .step-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.03em;
    }
    .step-copy {
      margin: 0;
      color: #475569;
      font-size: 14px;
      line-height: 1.72;
    }
    .step-meta {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .step-meta span {
      padding: 5px 8px;
      border-radius: 999px;
      background: #f8fbff;
      border: 1px solid #d9e3f2;
      color: #334155;
      font-size: 11px;
      font-weight: 700;
    }
    .command-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .command-card {
      padding: 18px;
      display: grid;
      gap: 12px;
    }
    .axis-card {
      padding: 18px;
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .axis-card strong {
      font-size: 16px;
      letter-spacing: -.02em;
    }
    .axis-copy {
      margin: 0;
      color: #475569;
      font-size: 14px;
      line-height: 1.72;
    }
    .axis-list {
      margin: 0;
      padding-left: 18px;
      color: #334155;
      font-size: 13px;
      line-height: 1.7;
    }
    .command-card pre {
      margin: 0;
      padding: 14px;
      border-radius: 16px;
      background: #0f172a;
      color: #e2e8f0;
      overflow-x: auto;
      font: 600 12px/1.7 "IBM Plex Mono","Consolas",monospace;
    }
    .table-block {
      padding: 0;
      overflow: hidden;
    }
    .table-toolbar {
      padding: 16px 18px 0;
    }
    .table-wrap {
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      margin-top: 14px;
    }
    table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
    }
    table th:nth-child(2), table td:nth-child(2) {
      min-width: 260px;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 12px;
      font-size: var(--layout-main-table-font-size);
      text-align: left;
      vertical-align: top;
      line-height: var(--layout-main-table-line-height);
      background: #fff;
    }
    th {
      background: var(--table-head);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .ok { color: #166534; font-weight: 700; }
    .todo { color: #b91c1c; font-weight: 700; }
    @media (max-width: 1100px) {
      .badge-row, .step-grid, .command-grid, .axis-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      h1 { font-size: 28px; }
    }
    @media (max-width: 700px) {
      .badge-row, .step-grid, .command-grid, .axis-grid {
        grid-template-columns: 1fr;
      }
      .hero {
        padding: 20px;
      }
    }
  </style>
</head>

    const COUNTRY = {
      ko: { '한국':'한국','영국':'영국','호주':'호주','EU':'EU','미국':'미국','중국':'중국','사우디':'사우디아라비아','독일':'독일','프랑스':'프랑스','인도':'인도','파키스탄':'파키스탄','아랍에미리에이트':'아랍에미리트','싱가폴':'싱가폴','아르헨티나':'아르헨티나' },
      en: { '한국':'Korea','영국':'United Kingdom','호주':'Australia','EU':'EU','미국':'United States','중국':'China','사우디':'Saudi Arabia','독일':'Germany','프랑스':'France','인도':'India','파키스탄':'Pakistan','아랍에미리에이트':'United Arab Emirates','싱가폴':'Singapore','아르헨티나':'Argentina' },
    };

    const LANG_STORAGE_KEY = 'deepfakePolicyLang';
    const qs = new URLSearchParams(location.search);
    const langSel = document.getElementById('lang');
    langSel.value = qs.get('lang') === 'ko'
      ? 'ko'
      : (() => {
          try { return !qs.has('lang') && localStorage.getItem(LANG_STORAGE_KEY) === 'ko' ? 'ko' : 'en'; }
          catch (_) { return 'en'; }
        })();
    const rowsEl = document.getElementById('rows');
    const tabHomeEl = document.getElementById('tabHome');
    const tabCountriesEl = document.getElementById('tabCountries');
    const tabCompareEl = document.getElementById('tabCompare');
    const tabPenaltiesEl = document.getElementById('tabPenalties');
    const tabRQEl = document.getElementById('tabRQ');
    const tabWorkflowEl = document.getElementById('tabWorkflow');

    function lang() {
      return langSel.value === 'ko' ? 'ko' : 'en';
    }
    function saveLang() {
      try { localStorage.setItem(LANG_STORAGE_KEY, lang()); }
      catch (_) {}
    }
    function withLang(path) {
      const url = new URL(path, location.origin);
      url.searchParams.set('lang', lang());
      return url.pathname + url.search + url.hash;
    }
    function refreshAppLinks() {
      document.querySelectorAll('a[href^="/deepfake-policy/"]').forEach((a) => {
        a.setAttribute('href', withLang(a.getAttribute('href')));
      });
    }

    function t() {
      return T[lang()];
    }

    function esc(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function countryLabel(value) {
      return (COUNTRY[lang()] || {})[value] || value;
    }

    function flag(value) {
      return value ? `<span class="ok">${esc(t().ok)}</span>` : `<span class="todo">${esc(t().todo)}</span>`;
    }

    function renderDocCards() {
      document.getElementById('docCards').innerHTML = t().docCards.map((item) => `
        <article class="doc-card">
          <span class="chip ${esc(item.chipClass)}">${esc(item.chip)}</span>
          <strong>${esc(item.title)}</strong>
          <p class="muted">${esc(item.copy)}</p>
        </article>
      `).join('');
    }

    function renderCodingCards() {
      const items = t().codingCards || T.en.codingCards || [];
      document.getElementById('codingCards').innerHTML = items.map((item) => `
        <article class="axis-card">
          <strong>${esc(item.title)}</strong>
          <p class="axis-copy">${esc(item.copy)}</p>
          <ul class="axis-list">
            ${(item.items || []).map((value) => `<li>${esc(value)}</li>`).join('')}
          </ul>
        </article>
      `).join('');
    }

    function renderSteps() {
      document.getElementById('stepGrid').innerHTML = t().steps.map((item, index) => `
        <article class="step-card">
          <span class="step-no">${index + 1}</span>
          <h3 class="step-title">${esc(item.title)}</h3>
          <p class="step-copy">${esc(item.copy)}</p>
          <div class="step-meta">
            ${(item.tags || []).map((tag) => `<span>${esc(tag)}</span>`).join('')}
          </div>
        </article>
      `).join('');
    }

    function applyText() {
      const tx = t();
      document.documentElement.lang = lang();
      refreshAppLinks();
      document.getElementById('sidebarKicker').textContent = tx.sidebarKicker;
      document.getElementById('title').textContent = tx.title;
      document.getElementById('subtitle').textContent = tx.subtitle;
      document.getElementById('langLabel').textContent = `${tx.lang}:`;
      tabHomeEl.textContent = tx.navHome;
      tabCountriesEl.textContent = tx.navCountries;
      tabCompareEl.textContent = tx.navCompare;
      tabPenaltiesEl.textContent = tx.navPenalties;
      tabRQEl.textContent = tx.navRQ;
      tabWorkflowEl.textContent = tx.navWorkflow;
      document.getElementById('linkMethod').textContent = tx.linkMethod;
      document.getElementById('linkSequence').textContent = tx.linkSequence;
      document.getElementById('linkRefresh').textContent = tx.linkRefresh;
      document.getElementById('linkChecklist').textContent = tx.linkChecklist;
      document.getElementById('heroEyebrow').textContent = tx.heroEyebrow;
      document.getElementById('heroTitle').textContent = tx.heroTitle;
      document.getElementById('heroDesc').textContent = tx.heroDesc;
      document.getElementById('codingTitle').textContent = tx.codingTitle || T.en.codingTitle;
      document.getElementById('codingDesc').textContent = tx.codingDesc || T.en.codingDesc;
      document.getElementById('sequenceTitle').textContent = tx.sequenceTitle;
      document.getElementById('sequenceDesc').textContent = tx.sequenceDesc;
      document.getElementById('refreshTitle').textContent = tx.refreshTitle;
      document.getElementById('refreshDesc').textContent = tx.refreshDesc;
      document.getElementById('refreshManualTitle').textContent = tx.refreshManualTitle;
      document.getElementById('refreshManualDesc').textContent = tx.refreshManualDesc;
      document.getElementById('refreshWrapperTitle').textContent = tx.refreshWrapperTitle;
      document.getElementById('refreshWrapperDesc').textContent = tx.refreshWrapperDesc;
      document.getElementById('checklistTitle').textContent = tx.checklistTitle;
      document.getElementById('checklistDesc').textContent = tx.checklistDesc;
      document.getElementById('refreshManualCode').textContent =
`node scripts\\build-document-inventory.js
node scripts\\extract-official-text.js
node scripts\\normalize-official-text.js
node scripts\\segment-official-text.js
node scripts\\build-flat-clause-coding-table.js
node scripts\\build-analysis-artifacts.js
node scripts\\normalize-official-text-korean.js
node scripts\\segment-official-text-korean-aligned.js`;
      document.getElementById('refreshWrapperCode').textContent =
`powershell -ExecutionPolicy Bypass -File scripts\\refresh-official-text-pipeline.ps1
powershell -ExecutionPolicy Bypass -File scripts\\refresh-korean-translation-alignment.ps1`;
      document.getElementById('hCountry').textContent = tx.country;
      document.getElementById('hPath').textContent = tx.path;
      document.getElementById('hType').textContent = tx.type;
      document.getElementById('hStage').textContent = tx.stage;
      document.getElementById('hDate').textContent = tx.date;
      document.getElementById('hSource').textContent = tx.source;
      document.getElementById('hTypeChk').textContent = tx.typeChk;
      document.getElementById('hStageChk').textContent = tx.stageChk;
      document.getElementById('hTimeChk').textContent = tx.timeChk;
      document.getElementById('hRefChk').textContent = tx.refChk;
      document.getElementById('hSumChk').textContent = tx.sumChk;
      renderDocCards();
      renderCodingCards();
      renderSteps();
    }

    async function renderChecklist() {
      const res = await fetch('/api-static/workflow-checklist.json');
      const json = res.ok ? await res.json() : { checklist: [] };
      rowsEl.innerHTML = (json.checklist || []).map((row) => `<tr>
        <td>${esc(countryLabel(row.country))}</td>
        <td>${esc(row.relative_path)}</td>
        <td>${esc(row.document_type || '')}</td>
        <td>${esc(row.law_stage || '')}</td>
        <td>${esc(row.event_date || '')}</td>
        <td>${esc(row.timeline_source || '')}</td>
        <td>${flag(row.checklist && row.checklist.classify_document_type)}</td>
        <td>${flag(row.checklist && row.checklist.validate_law_stage)}</td>
        <td>${flag(row.checklist && row.checklist.add_timeline_metadata)}</td>
        <td>${flag(row.checklist && row.checklist.link_refs_in_summary)}</td>
        <td>${flag(row.checklist && row.checklist.sync_country_summary)}</td>
      </tr>`).join('');
    }

    langSel.addEventListener('change', async () => {
      saveLang();
      applyText();
      await renderChecklist();
    });

    (async () => {
      saveLang();
      applyText();
      await renderChecklist();
    })();
  </script>
