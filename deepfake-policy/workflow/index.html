      return langSel.value === 'ko' ? 'ko' : 'en';

    function saveLang() {
      try { localStorage.setItem(LANG_STORAGE_KEY, lang()); }
      catch (_) {}

    function withLang(path) {
      const url = new URL(path, location.origin);
      url.searchParams.set('lang', lang());
      return url.pathname + url.search + url.hash;
    }
    function refreshAppLinks() {
      document.querySelectorAll('a[href^="/deepfake-policy/"]').forEach((a) => {
        a.setAttribute('href', withLang(a.getAttribute('href')));
      });
    }

    function t() {
      return T[lang()];
    }

    function esc(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function countryLabel(value) {
      return (COUNTRY[lang()] || {})[value] || value;
    }

    function flag(value) {
      return value ? `<span class="ok">${esc(t().ok)}</span>` : `<span class="todo">${esc(t().todo)}</span>`;

    }

      saveLang();
      applyText();

      applyText();
      await renderChecklist();
