<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Deepfake Policy Observatory: an academic project page for comparing deepfake and synthetic-media regulation through country dashboards and clause-based coding." />
  <link rel="canonical" href="https://kimjwn.github.io/deepfake-policy/" />
  <meta property="og:title" content="Deepfake Policy Observatory" />
  <meta property="og:description" content="Compare deepfake and synthetic-media regulation through country dashboards, legal text, corpus data, and clause-based coding results." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kimjwn.github.io/deepfake-policy/" />
  <title>Deepfake Policy Observatory</title>
  <link rel="stylesheet" href="../assets/palette.css" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --paper-ink: #142033;
      --paper-muted: #64748b;
      --paper-line: rgba(20, 32, 51, 0.08);
      --paper-blue: #2457d6;
      --paper-blue-dark: #163b91;
      --paper-warm: #fff7ed;
      --paper-card: rgba(255, 255, 255, 0.9);
      --paper-shadow: none;
    }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--paper-ink);
      font-family: Georgia, "Times New Roman", "Noto Serif KR", serif;
      background:
        radial-gradient(circle at 16% 8%, rgba(36, 87, 214, 0.14), transparent 30%),
        radial-gradient(circle at 90% 18%, rgba(251, 146, 60, 0.16), transparent 24%),
        linear-gradient(180deg, #fbfdff 0%, #f7f9fc 46%, #ffffff 100%);
    }
    a { color: inherit; }
    .page {
      max-width: 1600px;
      margin: 0 auto;
      padding: 30px 22px 72px;
    }
    .hero-title-row {
      position: relative;
      max-width: 1600px;
      margin: 0 auto;
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }
    .langbox {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--paper-line);
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }
    .langbox label {
      color: var(--paper-muted);
      font-size: 12px;
      font-weight: 700;
    }
    .langbox select {
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--paper-ink);
      font-size: 12px;
      font-weight: 800;
    }
    .hero {
      text-align: center;
      padding: 52px 0 42px;
    }
    .hero h1 {
      max-width: 1220px;
      margin: 8px auto 22px;
      color: #111827;
      font-size: clamp(40px, 7vw, 78px);
      line-height: .98;
      letter-spacing: -.07em;
      font-weight: 900;
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }
    .authors {
      margin: 18px 0 0;
      color: #334155;
      font: 600 16px/1.55 "Poppins", "Noto Sans KR", sans-serif;
    }
    .affiliation {
      margin: 10px 0 0;
      color: var(--paper-muted);
      font: 500 13px/1.6 "Poppins", "Noto Sans KR", sans-serif;
    }
    .project-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 34px auto 0;
    }
    .paper-figure {
      width: 100%;
      margin: 0 auto;
    }
    .paper-figure img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 16px;
    }
    .hero-figure {
      max-width: 1180px;
      margin: 48px auto 0;
    }
    .project-btn {
      min-width: 210px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 18px;
      border-radius: 999px;
      text-decoration: none;
      font: 800 14px/1 "Poppins", "Noto Sans KR", sans-serif;
      border: 0;
      color: #fff;
      background: #0f172a;
      transition: transform .2s ease, background .2s ease;
    }
    .project-btn:hover {
      transform: translateY(-2px);
      box-shadow: none;
      background: #111827;
    }
    .project-btn.primary {
      box-shadow: none;
    }
    .project-btn.secondary {
      box-shadow: none;
    }
    .abstract-band {
      width: 100vw;
      margin: 58px 0 0 calc(50% - 50vw);
      padding: 82px 22px;
      background: linear-gradient(180deg, #f3f5f8 0%, #edf1f6 100%);
      border-top: 1px solid transparent;
      border-bottom: 1px solid transparent;
    }
    .abstract-inner {
      max-width: 1180px;
      margin: 0 auto;
      text-align: center;
    }
    .abstract-inner h2 {
      margin: 0 0 30px;
      color: #111827;
      font: 900 34px/1 "Poppins", "Noto Sans KR", sans-serif;
      letter-spacing: -.05em;
    }
    .abstract-content {
      color: #334155;
      font-size: 17px;
      line-height: 1.78;
      text-align: justify;
      text-justify: inter-word;
    }
    .teaser {
      margin: 74px 0 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, .82fr) minmax(360px, 1fr);
      gap: 28px;
      align-items: stretch;
    }
    .figure-panel,
    .quote-panel {
      position: relative;
      border: 1px solid transparent;
      border-radius: 26px;
      background: var(--paper-card);
      box-shadow: var(--paper-shadow);
      overflow: hidden;
    }
    .figure-panel {
      min-height: 0;
      padding: 34px;
      display: grid;
      gap: 34px;
      align-content: space-between;
      background:
        linear-gradient(135deg, rgba(255,255,255,.92), rgba(241,246,255,.9)),
        repeating-linear-gradient(90deg, rgba(36,87,214,.06) 0 1px, transparent 1px 60px);
    }
    .figure-title {
      margin: 0;
      font: 900 25px/1.1 "Poppins", "Noto Sans KR", sans-serif;
      letter-spacing: -.04em;
    }
    .figure-subtitle {
      max-width: 46ch;
      margin: 18px auto 0;
      color: var(--paper-muted);
      font: 500 13px/1.6 "Poppins", "Noto Sans KR", sans-serif;
      text-align: center;
    }
    .pipeline {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 34px 0;
    }
    .pipeline-node {
      min-height: 132px;
      border: 1px solid transparent;
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,.78);
      display: grid;
      align-content: start;
      gap: 8px;
      text-align: left;
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }
    .node-num {
      width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      color: #fff;
      background: #173b8f;
      font-size: 12px;
      font-weight: 900;
    }
    .node-title {
      margin: 0;
      font-size: 13px;
      font-weight: 900;
      color: #172554;
    }
    .node-copy {
      margin: 0;
      color: #64748b;
      font-size: 11px;
      line-height: 1.55;
    }
    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .stat {
      border-radius: 18px;
      border: 1px solid transparent;
      background: #fff;
      padding: 14px 12px;
      text-align: center;
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }
    .stat strong {
      display: block;
      color: #0f3b91;
      font-size: 25px;
      line-height: 1;
      letter-spacing: -.04em;
    }
    .stat span {
      display: block;
      margin-top: 5px;
      color: #64748b;
      font-size: 11px;
      font-weight: 700;
    }
    .stat small {
      display: block;
      max-width: 210px;
      margin: 7px auto 0;
      color: #94a3b8;
      font-size: 9px;
      font-weight: 600;
      line-height: 1.35;
    }
    .quote-panel {
      min-height: 430px;
      padding: 34px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      background:
        radial-gradient(circle at 20% 5%, rgba(36, 87, 214, .12), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,247,237,.74));
    }
    .quote-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }
    .quote-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      color: #173b8f;
      background: #eef4ff;
      border: 1px solid transparent;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .quote-source {
      color: #64748b;
      font-size: 12px;
      font-weight: 800;
    }
    .quote-card {
      position: relative;
      display: grid;
      align-content: center;
      gap: 14px;
      min-height: 300px;
      padding: 8px 2px;
      transition: opacity .34s ease, transform .34s ease;
    }
    .wordcloud-figure {
      max-width: 100%;
      padding: 0;
      align-self: center;
    }
    .wordcloud-figure img {
      aspect-ratio: 16 / 10;
      object-fit: contain;
    }
    .quote-card.is-fading {
      opacity: 0;
      transform: translateY(8px);
    }
    .quote-text {
      margin: 0;
      color: #111827;
      font: 500 16px/1.72 "IBM Plex Mono", "Consolas", "Noto Sans Mono CJK KR", monospace;
      white-space: pre-line;
    }
    .quote-meta {
      display: grid;
      gap: 4px;
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }
    .quote-meta strong {
      color: #0f3b91;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .quote-meta span {
      color: #334155;
      font-size: 13px;
      font-weight: 700;
    }
    .dots {
      display: flex;
      justify-content: center;
      gap: 7px;
      flex-wrap: wrap;
    }
    .dot {
      width: 9px;
      height: 9px;
      border: 0;
      border-radius: 999px;
      background: rgba(100,116,139,.28);
      cursor: pointer;
      transition: width .2s ease, background .2s ease;
    }
    .dot.active {
      width: 34px;
      background: #2457d6;
    }
    .section {
      width: 100vw;
      margin: 82px 0 0 calc(50% - 50vw);
      padding: 82px 22px;
      text-align: center;
      background: linear-gradient(180deg, #f3f5f8 0%, #edf1f6 100%);
      border-top: 1px solid transparent;
      border-bottom: 1px solid transparent;
    }
    .section-inner {
      max-width: 1180px;
      margin: 0 auto;
    }
    .section h2 {
      margin: 0 0 24px;
      color: #111827;
      font: 900 31px/1.08 "Poppins", "Noto Sans KR", sans-serif;
      letter-spacing: -.05em;
    }
    .section p {
      margin: 0 auto;
      color: #475569;
      font-size: 16px;
      line-height: 1.72;
    }
    .method-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 34px;
      text-align: left;
    }
    .section-figure {
      max-width: 1120px;
      margin-top: 48px;
      margin-bottom: 46px;
    }
    .method-card {
      border: 1px solid transparent;
      border-radius: 20px;
      padding: 18px;
      background: rgba(255,255,255,.82);
      box-shadow: none;
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }
    .method-card h3 {
      margin: 0 0 14px;
      color: #172554;
      font-size: 15px;
      letter-spacing: -.02em;
    }
    .method-card p {
      margin: 0;
      color: #64748b;
      font-size: 13px;
      line-height: 1.58;
    }
    .footer {
      margin-top: 74px;
      padding-top: 26px;
      border-top: 1px solid var(--paper-line);
      color: #64748b;
      text-align: center;
      font: 600 12px/1.6 "Poppins", "Noto Sans KR", sans-serif;
    }
    @media (max-width: 940px) {
      .teaser { grid-template-columns: 1fr; }
      .figure-panel, .quote-panel { min-height: auto; }
      .pipeline { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .method-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .page { padding: 22px 14px 52px; }
      .hero { padding: 40px 0 34px; }
      .hero-title-row {
        display: grid;
        gap: 16px;
      }
      .langbox {
        position: static;
        justify-self: end;
      }
      .hero h1 { font-size: 40px; }
      .project-btn { width: 100%; }
      .hero-figure { margin-top: 34px; }
      .teaser { gap: 46px; }
      .figure-panel, .quote-panel { padding: 24px; }
      .abstract-band { padding: 60px 16px; }
      .section { padding: 60px 16px; }
      .section-figure { margin-top: 36px; margin-bottom: 34px; }
      .abstract-content { text-align: left; font-size: 15px; }
      .pipeline { grid-template-columns: 1fr; }
      .stat-row { grid-template-columns: 1fr; }
      .quote-text { font-size: 13px; }
    }
  </style>
</head>
<body>
  <main class="page">

      </div>
      <p class="authors" id="authorsText"></p>
      <p class="affiliation" id="affiliationText"></p>
      <figure class="paper-figure hero-figure">
        <img src="./figures/deepfake_method-output.png" alt="Deepfake policy methodology overview" loading="eager" />
      </figure>
      <div class="project-links" aria-label="Project navigation">
        <a class="project-btn primary" id="countriesBtn" href="/deepfake-policy/countries/"></a>
        <a class="project-btn secondary" id="codingBtn" href="/deepfake-policy/coding/"></a>

    <!-- Paper abstract -->
    <section class="abstract-band" aria-labelledby="abstractTitle">

          <img src="./figures/image.png" alt="Corpus and analysis scope figure" loading="lazy" />
        </figure>
        <div class="method-grid" id="methodGrid"></div>
      </div>
    </section>

    <footer class="footer" id="footerText"></footer>
  </main>

        provision: {

        provision: {
          en: 'It shall not be a defense to an action under this section that a deepfake pornography service has a disclaimer or statement that states that users are prohibited from generating digitized sexually explicit material of a depicted individual without the individual’s consent.',
          ko: '딥페이크 포르노그래피 서비스가 이용자에게 개인의 동의 없이 묘사된 개인의 디지털화된 성적으로 노골적인 자료를 생성하는 것을 금지한다는 고지문 또는 진술을 두고 있다는 점은 이 조에 따른 소송에 대한 항변이 되지 않는다.'

        source: { en: 'Official Chinese rule, translated in corpus', ko: '중국 공식 규정 번역본' },
        provision: {

          ko: '딥페이크서비스 제공자는 해당 서비스를 사용하여 생성하거나 편집한 정보 내용에 대하여 이용자의 사용에 영향을 미치지 않는 기술적 조치를 통해 표시를 추가하고, 법률 및 관련 국가 규정에 따라 로그 정보를 보관하여야 한다.'

      },
      {
        country: { en: 'China', ko: '중국' },
        law: { en: 'Deep Synthesis Provisions, Article 17', ko: '인터넷정보서비스 딥페이크 관리 규정 제17조' },
        source: { en: 'Official Chinese rule, translated in corpus', ko: '중국 공식 규정 번역본' },
        provision: {
          en: 'Where a deep synthesis service may cause public confusion or misidentification, the provider shall place a conspicuous identifier in an appropriate position or area of the generated or edited content to alert the public that the content is deep-synthesised.',
          ko: '딥페이크서비스 제공자가 대중의 혼동 또는 오인을 유발할 수 있는 딥페이크서비스를 제공하는 경우, 생성 또는 편집한 정보 내용의 합리적인 위치나 영역에 명시적 표시를 하여 대중에게 딥페이크 상황임을 알려야 한다.'

    ];

    const qs = new URLSearchParams(location.search);
    const uiLang = document.getElementById('uiLang');
    uiLang.value = qs.get('lang') === 'ko'
      ? 'ko'
      : (() => {
          try { return !qs.has('lang') && localStorage.getItem(LANG_STORAGE_KEY) === 'ko' ? 'ko' : 'en'; }
          catch (_) { return 'en'; }
        })();

    const els = {
      langLabel: document.getElementById('langLabel'),
      projectTitle: document.getElementById('projectTitle'),
      authorsText: document.getElementById('authorsText'),
      affiliationText: document.getElementById('affiliationText'),
      countriesBtn: document.getElementById('countriesBtn'),
      codingBtn: document.getElementById('codingBtn'),
      abstractTitle: document.getElementById('abstractTitle'),
      abstractText: document.getElementById('abstractText'),
      figureTitle: document.getElementById('figureTitle'),
      figureSubtitle: document.getElementById('figureSubtitle'),
      pipeline: document.getElementById('pipeline'),
      stats: document.getElementById('stats'),
      quoteBadge: document.getElementById('quoteBadge'),
      quoteSource: document.getElementById('quoteSource'),
      quoteCard: document.getElementById('quoteCard'),
      quoteText: document.getElementById('quoteText'),
      quoteCountry: document.getElementById('quoteCountry'),
      quoteLaw: document.getElementById('quoteLaw'),
      quoteDots: document.getElementById('quoteDots'),
      summaryTitle: document.getElementById('summaryTitle'),
      summaryText: document.getElementById('summaryText'),
      methodGrid: document.getElementById('methodGrid'),
      footerText: document.getElementById('footerText')
    };

    let currentQuote = 0;
    let rotateTimer = null;
    let fadeTimer = null;

    function lang() {
      return uiLang.value === 'ko' ? 'ko' : 'en';
    }
    function t() {
      return T[lang()];
    }
    function saveLang() {
      try { localStorage.setItem(LANG_STORAGE_KEY, lang()); }
      catch (_) {}
    }
    function withLang(path) {
      const url = new URL(path, location.origin);
      url.searchParams.set('lang', lang());
      return url.pathname + url.search + url.hash;
    }
    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function visibleQuotes() {
      return QUOTES.map((q) => ({
        country: q.country[lang()] || q.country.en,
        law: q.law[lang()] || q.law.en,
        source: q.source[lang()] || q.source.en,
        provision: q.provision[lang()] || q.provision.en
      }));
    }
    function renderStaticText() {
      const x = t();
      document.documentElement.lang = lang();
      els.langLabel.textContent = `${x.lang}:`;
      els.projectTitle.textContent = x.title;
      els.authorsText.textContent = x.authors;
      els.affiliationText.textContent = x.affiliation;
      els.countriesBtn.textContent = x.countriesBtn;
      els.countriesBtn.href = withLang('/deepfake-policy/countries/');
      els.codingBtn.textContent = x.codingBtn;
      els.codingBtn.href = withLang('/deepfake-policy/coding/');
      els.abstractTitle.textContent = x.abstractTitle;
      els.abstractText.textContent = x.abstract;
      els.figureTitle.textContent = x.figureTitle;
      els.figureSubtitle.textContent = x.figureSubtitle;
      els.quoteBadge.textContent = x.quoteBadge;
      els.summaryTitle.textContent = x.summaryTitle;
      els.summaryText.textContent = x.summaryText;
      els.footerText.textContent = x.footer;
      els.pipeline.innerHTML = x.pipeline.map((item, idx) => `
        <div class="pipeline-node">
          <span class="node-num">${idx + 1}</span>
          <p class="node-title">${escapeHtml(item[0])}</p>
          <p class="node-copy">${escapeHtml(item[1])}</p>
        </div>
      `).join('');
      els.stats.innerHTML = x.stats.map((item) => `
        <div class="stat">
          <strong>${escapeHtml(item[0])}</strong>
          <span>${escapeHtml(item[1])}</span>
          ${item[2] ? `<small>${escapeHtml(item[2])}</small>` : ''}
        </div>
      `).join('');
      els.methodGrid.innerHTML = x.methods.map((item) => `
        <article class="method-card">
          <h3>${escapeHtml(item[0])}</h3>
          <p>${escapeHtml(item[1])}</p>
        </article>
      `).join('');
    }
    async function refreshStatsFromData() {
      try {
        const [countriesRes, codingRes] = await Promise.all([
          fetch('/api-static/countries.json?v=20260708-home-stats1'),
          fetch('/api-static/coding-results.json?v=20260708-home-stats1')
        ]);
        if (!countriesRes.ok || !codingRes.ok) return;
        const countriesPayload = await countriesRes.json();
        const codingPayload = await codingRes.json();
        const jurisdictionCount = 18;
        const dimensionPayload = codingPayload.summary && codingPayload.summary.by_primary_policy_dimension;
        const dimensionCount = Array.isArray(dimensionPayload) ? dimensionPayload.length : Object.keys(dimensionPayload || {}).length;
        const codedRows = Number(codingPayload.total_coded_rows || 0);
        const locale = lang() === 'ko' ? 'ko-KR' : 'en-US';
        const updated = t().stats.map((item, index) => {
          if (index === 0) return [jurisdictionCount.toLocaleString(locale), item[1], item[2]];
          if (index === 1 && dimensionCount) return [dimensionCount.toLocaleString(locale), item[1]];
          if (index === 2 && codedRows) return [codedRows.toLocaleString(locale), item[1]];
          return item;
        });
        els.stats.innerHTML = updated.map((item) => `
          <div class="stat">
            <strong>${escapeHtml(item[0])}</strong>
            <span>${escapeHtml(item[1])}</span>
            ${item[2] ? `<small>${escapeHtml(item[2])}</small>` : ''}
          </div>
        `).join('');
      } catch (_) {}
    }
    function renderQuote() {
      const list = visibleQuotes();
      const q = list[currentQuote % list.length];
      els.quoteBadge.textContent = `${t().quoteIndicator} ${currentQuote + 1} / ${list.length}`;
      els.quoteSource.textContent = q.source;
      els.quoteText.textContent = q.provision;
      els.quoteCountry.textContent = q.country;
      els.quoteLaw.textContent = q.law;
      els.quoteDots.innerHTML = list.map((_, idx) => `
        <button class="dot${idx === currentQuote ? ' active' : ''}" type="button" data-quote="${idx}" aria-label="${escapeHtml(`${t().quoteIndicator} ${idx + 1}`)}"></button>
      `).join('');
      els.quoteDots.querySelectorAll('button[data-quote]').forEach((btn) => {
        btn.addEventListener('click', () => setQuote(Number(btn.getAttribute('data-quote')), true));
      });
    }
    function scheduleRotation() {
      clearInterval(rotateTimer);
      rotateTimer = setInterval(() => setQuote(currentQuote + 1, true), 5600);
    }
    function setQuote(next, animate) {
      const list = visibleQuotes();
      currentQuote = ((next % list.length) + list.length) % list.length;
      clearTimeout(fadeTimer);
      if (!animate) {
        els.quoteCard.classList.remove('is-fading');
        renderQuote();
        scheduleRotation();
        return;
      }
      els.quoteCard.classList.add('is-fading');
      fadeTimer = setTimeout(() => {
        renderQuote();
        els.quoteCard.classList.remove('is-fading');
      }, 180);
      scheduleRotation();
    }
    function renderAll() {
      saveLang();
      renderStaticText();
      refreshStatsFromData();
      setQuote(Math.min(currentQuote, visibleQuotes().length - 1), false);
    }

    uiLang.addEventListener('change', renderAll);
    renderAll();
  </script>
</body>
</html>
