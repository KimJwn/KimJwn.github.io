          en: `Article 16\nDeep synthesis service providers shall add identifiers, through technical measures that do not affect user use, to information content generated or edited through their services, and shall preserve log information in accordance with law and relevant state provisions.`,
        },
      },
      {
        country: { ko: '중국', en: 'China' },
        law: { ko: '인터넷정보서비스 딥페이크 관리 규정 제17조', en: 'Deep Synthesis Provisions, Article 17' },
        source: { ko: 'Korean translation file', en: 'Korean translation file' },
        provision: {
          ko: `제17조\n딥페이크서비스 제공자가 다음과 같은 딥페이크서비스를 제공하여 대중의 혼동 또는 착각을 유발할 수 있는 경우, 생성 또는 편집된 정보 내용의 합리적인 위치나 영역에 명시하여 대중에게 딥페이크 상황임을 알려야 한다.\n\n딥페이크서비스 제공자가 위 문단의 규정 이외의 딥페이크서비스를 제공하는 경우, 눈에 띄는 식별 기능을 제공하고 딥페이크서비스 고용주가 눈에 띄는 표시를 할 수 있음을 안내하여야 한다.`,
          en: `Article 17\nWhere a deep synthesis service may cause public confusion or misidentification, the provider shall place a conspicuous identifier in an appropriate position or area of the generated or edited content to alert the public that the content is deep-synthesised.\n\nFor other deep synthesis services, providers shall offer a conspicuous labeling function and inform users that they may apply such visible labeling.`,
        },
      },
      {
        country: { ko: 'EU', en: 'EU' },
        law: { ko: 'EU AI Act 제50조', en: 'EU AI Act, Article 50' },
        source: { ko: null, en: 'Official text' },
        provision: {
          ko: null,
          en: `Article 50 (2) Providers of AI systems generating synthetic audio, image, video or text content shall ensure that the outputs are marked in a machine-readable format and detectable as artificially generated or manipulated.`,
        },
      },
      {
        country: { ko: 'EU', en: 'EU' },
        law: { ko: 'EU AI Act 제50조', en: 'EU AI Act, Article 50' },
        source: { ko: null, en: 'Official text' },
        provision: {
          ko: null,
          en: `Article 50 (4) Deployers of an AI system that generates or manipulates image, audio or video content constituting a deep fake shall disclose that the content has been artificially generated or manipulated.`,
        },
      },
    ];

    const LANG_STORAGE_KEY = 'deepfakePolicyLang';
    const qs = new URLSearchParams(location.search);
    const uiLang = document.getElementById('uiLang');
    const siteTitleEl = document.getElementById('siteTitle');
    const langLabelEl = document.getElementById('langLabel');
    const eyebrowEl = document.getElementById('eyebrow');
    const homeTitleEl = document.getElementById('homeTitle');
    const homeDescEl = document.getElementById('homeDesc');
    const primaryCtaEl = document.getElementById('primaryCta');
    const secondaryCtaEl = document.getElementById('secondaryCta');
    const quoteCardEl = document.getElementById('quoteCard');
    const quoteIndicatorEl = document.getElementById('quoteIndicator');
    const quoteSourceEl = document.getElementById('quoteSource');
    const quoteBodyEl = document.getElementById('quoteBody');
    const quoteCountryEl = document.getElementById('quoteCountry');
    const quoteLawEl = document.getElementById('quoteLaw');
    const quoteDotsEl = document.getElementById('quoteDots');
    const bgQuotesEl = document.getElementById('bgQuotes');
    const footerNoteEl = document.getElementById('footerNote');

    let currentIndex = 0;
    let rotateTimer = null;
    let fadeTimer = null;
    uiLang.value = qs.get('lang') === 'ko'
      ? 'ko'
      : (() => {
          try { return !qs.has('lang') && localStorage.getItem(LANG_STORAGE_KEY) === 'ko' ? 'ko' : 'en'; }
          catch (_) { return 'en'; }
        })();

    function lang() {
      return uiLang.value === 'en' ? 'en' : 'ko';
    }
    function saveLang() {
      try { localStorage.setItem(LANG_STORAGE_KEY, lang()); }
      catch (_) {}
    }
    function withLang(path) {
      const url = new URL(path, location.origin);
      url.searchParams.set('lang', lang());
      return url.pathname + url.search + url.hash;
    }
    function refreshLinks() {
      document.querySelectorAll('a[href^="/deepfake-policy/"]').forEach((a) => {
        a.setAttribute('href', withLang(a.getAttribute('href')));
      });
    }
    function text() {
      return T[lang()];
    }
    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function quotes() {
      return QUOTES
        .map((q) => ({
          country: q.country[lang()] || q.country.en,
          law: q.law[lang()] || q.law.en,
          source: q.source[lang()] || q.source.en,
          provision: q.provision[lang()] || null,
        }))
        .filter((q) => q.provision);
    }
    function renderBgQuotes() {
      const positions = [
        { top: '10%', left: '4%', rotate: '-5deg' },
        { top: '22%', right: '6%', rotate: '4deg' },
        { top: '42%', left: '7%', rotate: '-2deg' },
        { top: '58%', right: '8%', rotate: '3deg' },
        { top: '76%', left: '13%', rotate: '-4deg' },
        { top: '84%', right: '4%', rotate: '2deg' },
      ];
      bgQuotesEl.innerHTML = quotes().slice(0, 6).map((q, idx) => {
        const pos = positions[idx];
        const side = pos.left ? `left:${pos.left};` : `right:${pos.right};`;
        return `<span class="bg-quote" style="top:${pos.top};${side}transform:rotate(${pos.rotate});">${escapeHtml(q.provision.replace(/\s+/g, ' '))}</span>`;
      }).join('');
    }
    function renderQuote() {
      const q = quotes()[currentIndex];
      const t = text();
      quoteIndicatorEl.textContent = `${t.indicator} ${currentIndex + 1} / ${quotes().length}`;
      quoteSourceEl.textContent = q.source;
      quoteBodyEl.textContent = q.provision;
      quoteCountryEl.textContent = q.country;
      quoteLawEl.textContent = q.law;
      quoteDotsEl.innerHTML = quotes().map((_, idx) => `<button class="dot${idx === currentIndex ? ' active' : ''}" type="button" data-idx="${idx}" aria-label="${escapeHtml(`${t.indicator} ${idx + 1}`)}"></button>`).join('');
      quoteDotsEl.querySelectorAll('.dot').forEach((btn) => {
        btn.addEventListener('click', () => setQuote(Number(btn.getAttribute('data-idx')), true));
      });
    }
    function scheduleRotation() {
      clearInterval(rotateTimer);
      rotateTimer = setInterval(() => {
        setQuote((currentIndex + 1) % quotes().length, true);
      }, 5200);
    }
    function setQuote(nextIndex, animate) {
      currentIndex = ((nextIndex % quotes().length) + quotes().length) % quotes().length;
      clearTimeout(fadeTimer);
      if (animate) {
        quoteCardEl.classList.add('is-fading');
        fadeTimer = setTimeout(() => {
          renderQuote();
          quoteCardEl.classList.remove('is-fading');
        }, 220);
      } else {
        quoteCardEl.classList.remove('is-fading');
        renderQuote();
      }
      scheduleRotation();
    }
    function renderText() {
      const t = text();
      document.documentElement.lang = lang();
      siteTitleEl.textContent = t.siteTitle;
      langLabelEl.textContent = `${t.lang}:`;
      eyebrowEl.textContent = t.eyebrow;
      const accent = escapeHtml(t.accent);
      homeTitleEl.innerHTML = escapeHtml(t.title).replace(accent, `<span class="accent">${accent}</span>`).replace(/\n/g, '<br />');
      homeDescEl.textContent = t.desc;
      primaryCtaEl.textContent = t.primary;
      secondaryCtaEl.textContent = t.secondary;
      document.getElementById('portal1Kick').textContent = t.portal1Kick;
      document.getElementById('portal1Title').textContent = t.portal1Title;
      document.getElementById('portal1Copy').textContent = t.portal1Copy;
      document.getElementById('portal2Kick').textContent = t.portal2Kick;
      document.getElementById('portal2Title').textContent = t.portal2Title;
      document.getElementById('portal2Copy').textContent = t.portal2Copy;
      document.getElementById('portal3Kick').textContent = t.portal3Kick;
      document.getElementById('portal3Title').textContent = t.portal3Title;
      document.getElementById('portal3Copy').textContent = t.portal3Copy;
      document.getElementById('portal4Kick').textContent = t.portal4Kick;
      document.getElementById('portal4Title').textContent = t.portal4Title;
      document.getElementById('portal4Copy').textContent = t.portal4Copy;
      footerNoteEl.textContent = t.footer;
      refreshLinks();
      renderBgQuotes();
      setQuote(currentIndex, false);
    }

    uiLang.addEventListener('change', () => {
      saveLang();
      renderText();
    });
    saveLang();
    renderText();
  </script>
</body>
</html>
