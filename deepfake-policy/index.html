<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <title>Private Project</title>
  <link rel="stylesheet" href="../assets/palette.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Poppins", "Noto Sans KR", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 94, 234, 0.12), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(148, 163, 184, 0.18), transparent 22%),
        linear-gradient(180deg, #f8fbff 0%, #f8fafc 44%, #ffffff 100%);
    }
    .card {
      width: min(680px, 100%);
      background: linear-gradient(180deg, var(--card-strong) 0%, var(--card) 100%);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--shadow-strong);
    }
    .eyebrow {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--accent-line);
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    h1 {
      margin: 14px 0 10px;
      font-size: 30px;
      line-height: 1.1;
      color: var(--ink-strong);
    }
    p {
      margin: 0 0 10px;
      line-height: 1.6;
      color: var(--sub);
      font-size: 15px;
    }
    .note {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--ink-soft);
      font-size: 14px;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Private Preview</div>
    <h1>This project is not publicly listed.</h1>
    <p>This page is intentionally hidden from the public profile site for now.</p>
    <p>If access is needed, I will share the working version directly after review and permission.</p>
    <div class="note">
      Return to the main profile site:
      <a href="/">kimjwn.github.io</a>
    </div>
  </main>
</body>
</html>
