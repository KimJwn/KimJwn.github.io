  <link rel="canonical" href="https://kimjwn.github.io/deepfake-policy/" />

  <meta property="og:description" content="Compare deepfake and synthetic-media regulation through country dashboards, legal text, corpus data, and clause-based coding results." />

  <link rel="stylesheet" href="../assets/palette.css" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --paper-ink: #142033;
      --paper-muted: #64748b;
      --paper-line: rgba(20, 32, 51, 0.08);
      --paper-blue: #2457d6;
      --paper-blue-dark: #163b91;
      --paper-warm: #fff7ed;
      --paper-card: rgba(255, 255, 255, 0.9);
      --paper-shadow: none;

    html { scroll-behavior: smooth; }
    body {

      color: var(--paper-ink);
      font-family: Georgia, "Times New Roman", "Noto Serif KR", serif;
      background:

        radial-gradient(circle at 90% 18%, rgba(251, 146, 60, 0.16), transparent 24%),
        linear-gradient(180deg, #fbfdff 0%, #f7f9fc 46%, #ffffff 100%);
    }
    a { color: inherit; }
    .page {
      max-width: 1600px;
      margin: 0 auto;
      padding: 30px 22px 72px;
    }
    .hero-title-row {
      position: relative;
      max-width: 1600px;
      margin: 0 auto;
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }
    .langbox {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--paper-line);
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }
    .langbox label {
      color: var(--paper-muted);
      font-size: 12px;
      font-weight: 700;
    }
    .langbox select {
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--paper-ink);
      font-size: 12px;
      font-weight: 800;
    }
    .hero {
      text-align: center;
      padding: 52px 0 42px;
    }
    .hero h1 {
      max-width: 1220px;
      margin: 8px auto 22px;
      color: #111827;
      font-size: clamp(40px, 7vw, 78px);
      line-height: .98;
      letter-spacing: -.07em;
      font-weight: 900;
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }
    .authors {
      margin: 18px 0 0;
      color: #334155;
      font: 600 16px/1.55 "Poppins", "Noto Sans KR", sans-serif;
    }
    .affiliation {
      margin: 10px 0 0;
      color: var(--paper-muted);
      font: 500 13px/1.6 "Poppins", "Noto Sans KR", sans-serif;
    }
    .project-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 34px auto 0;
    }
    .paper-figure {
      width: 100%;
      margin: 0 auto;
    }
    .paper-figure img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 16px;
    }
    .hero-figure {
      max-width: 1180px;
      margin: 48px auto 0;
    }
    .project-btn {
      min-width: 210px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 18px;
      border-radius: 999px;
      text-decoration: none;
      font: 800 14px/1 "Poppins", "Noto Sans KR", sans-serif;
      border: 0;
      color: #fff;
      background: #0f172a;
      transition: transform .2s ease, background .2s ease;
    }
    .project-btn:hover {
      transform: translateY(-2px);
      box-shadow: none;
      background: #111827;
    }
    .project-btn.primary {
      box-shadow: none;
    }
    .project-btn.secondary {
      box-shadow: none;
    }
    .abstract-band {
      width: 100vw;
      margin: 58px 0 0 calc(50% - 50vw);
      padding: 82px 22px;
      background: linear-gradient(180deg, #f3f5f8 0%, #edf1f6 100%);
      border-top: 1px solid transparent;
      border-bottom: 1px solid transparent;
    }
    .abstract-inner {
      max-width: 1180px;
      margin: 0 auto;
      text-align: center;
    }
    .abstract-inner h2 {
      margin: 0 0 30px;
      color: #111827;
      font: 900 34px/1 "Poppins", "Noto Sans KR", sans-serif;
      letter-spacing: -.05em;
    }
    .abstract-content {
      color: #334155;
      font-size: 17px;
      line-height: 1.78;
      text-align: justify;
      text-justify: inter-word;
    }
    .teaser {
      margin: 74px 0 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, .82fr) minmax(360px, 1fr);
      gap: 28px;
      align-items: stretch;
    }
    .figure-panel,
    .quote-panel {
      position: relative;
      border: 1px solid transparent;
      border-radius: 26px;
      background: var(--paper-card);
      box-shadow: var(--paper-shadow);
      overflow: hidden;
    }
    .figure-panel {
      min-height: 0;
      padding: 34px;
      display: grid;
      gap: 34px;
      align-content: space-between;
      background:
        linear-gradient(135deg, rgba(255,255,255,.92), rgba(241,246,255,.9)),
        repeating-linear-gradient(90deg, rgba(36,87,214,.06) 0 1px, transparent 1px 60px);
    }
    .figure-title {
      margin: 0;
      font: 900 25px/1.1 "Poppins", "Noto Sans KR", sans-serif;
      letter-spacing: -.04em;
    }
    .figure-subtitle {
      max-width: 46ch;
      margin: 18px auto 0;
      color: var(--paper-muted);
      font: 500 13px/1.6 "Poppins", "Noto Sans KR", sans-serif;
      text-align: center;
    }
    .pipeline {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 34px 0;
    }
    .pipeline-node {
      min-height: 132px;
      border: 1px solid transparent;
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,.78);
      display: grid;
      align-content: start;
      gap: 8px;
      text-align: left;
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }
    .node-num {
      width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      color: #fff;
      background: #173b8f;
      font-size: 12px;
      font-weight: 900;
    }
    .node-title {
      margin: 0;
      font-size: 13px;
      font-weight: 900;
      color: #172554;
    }
    .node-copy {
      margin: 0;
      color: #64748b;
      font-size: 11px;
      line-height: 1.55;
    }
    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .stat {
      border-radius: 18px;
      border: 1px solid transparent;
      background: #fff;
      padding: 14px 12px;
      text-align: center;
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }
    .stat strong {
      display: block;
      color: #0f3b91;
      font-size: 25px;
      line-height: 1;
      letter-spacing: -.04em;
    }
    .stat span {
      display: block;
      margin-top: 5px;
      color: #64748b;
      font-size: 11px;
      font-weight: 700;
    }
    .quote-panel {
      min-height: 430px;
      padding: 34px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      background:
        radial-gradient(circle at 20% 5%, rgba(36, 87, 214, .12), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,247,237,.74));
    }
    .quote-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }
    .quote-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      color: #173b8f;
      background: #eef4ff;
      border: 1px solid transparent;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .quote-source {
      color: #64748b;
      font-size: 12px;
      font-weight: 800;
    }
    .quote-card {
      position: relative;
      display: grid;
      align-content: center;
      gap: 14px;
      min-height: 300px;
      padding: 8px 2px;
      transition: opacity .34s ease, transform .34s ease;
    }
    .wordcloud-figure {
      max-width: 100%;
      padding: 0;
      align-self: center;
    }
    .wordcloud-figure img {
      aspect-ratio: 16 / 10;
      object-fit: contain;
    }
    .quote-card.is-fading {
      opacity: 0;
      transform: translateY(8px);
    }
    .quote-text {
      margin: 0;
      color: #111827;
      font: 500 16px/1.72 "IBM Plex Mono", "Consolas", "Noto Sans Mono CJK KR", monospace;
      white-space: pre-line;
    }
    .quote-meta {
      display: grid;
      gap: 4px;
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }
    .quote-meta strong {
      color: #0f3b91;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .quote-meta span {
      color: #334155;
      font-size: 13px;
      font-weight: 700;
    }
    .dots {
      display: flex;
      justify-content: center;
      gap: 7px;
      flex-wrap: wrap;
    }
    .dot {
      width: 9px;
      height: 9px;
      border: 0;
      border-radius: 999px;
      background: rgba(100,116,139,.28);
      cursor: pointer;
      transition: width .2s ease, background .2s ease;
    }
    .dot.active {
      width: 34px;
      background: #2457d6;
    }

      margin: 82px 0 0 calc(50% - 50vw);
      padding: 82px 22px;
      text-align: center;
      background: linear-gradient(180deg, #f3f5f8 0%, #edf1f6 100%);
      border-top: 1px solid transparent;
      border-bottom: 1px solid transparent;
    }
    .section-inner {
      max-width: 1180px;
      margin: 0 auto;
    }
    .section h2 {
      margin: 0 0 24px;
      color: #111827;
      font: 900 31px/1.08 "Poppins", "Noto Sans KR", sans-serif;
      letter-spacing: -.05em;
    }
    .section p {
      margin: 0 auto;
      color: #475569;
      font-size: 16px;
      line-height: 1.72;
    }
    .method-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 34px;
      text-align: left;
    }
    .section-figure {
      max-width: 1120px;
      margin-top: 48px;
      margin-bottom: 46px;
    }

      border: 1px solid transparent;
      border-radius: 20px;
      padding: 18px;
      background: rgba(255,255,255,.82);
      box-shadow: none;
      font-family: "Poppins", "Noto Sans KR", sans-serif;
    }

      margin: 0 0 14px;
      color: #172554;
      font-size: 15px;
      letter-spacing: -.02em;
    }
    .method-card p {
      margin: 0;
      color: #64748b;
      font-size: 13px;
      line-height: 1.58;
    }
    .footer {
      margin-top: 74px;
      padding-top: 26px;
      border-top: 1px solid var(--paper-line);
      color: #64748b;
      text-align: center;
      font: 600 12px/1.6 "Poppins", "Noto Sans KR", sans-serif;
    }

      .teaser { grid-template-columns: 1fr; }
      .figure-panel, .quote-panel { min-height: auto; }
      .pipeline { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .method-grid { grid-template-columns: 1fr; }
    }

      .page { padding: 22px 14px 52px; }
      .hero { padding: 40px 0 34px; }
      .hero-title-row {
        display: grid;
        gap: 16px;
      }
      .langbox {
        position: static;
        justify-self: end;
      }
      .hero h1 { font-size: 40px; }
      .project-btn { width: 100%; }
      .hero-figure { margin-top: 34px; }
      .teaser { gap: 46px; }
      .figure-panel, .quote-panel { padding: 24px; }
      .abstract-band { padding: 60px 16px; }
      .section { padding: 60px 16px; }
      .section-figure { margin-top: 36px; margin-bottom: 34px; }
      .abstract-content { text-align: left; font-size: 15px; }
      .pipeline { grid-template-columns: 1fr; }
      .stat-row { grid-template-columns: 1fr; }
      .quote-text { font-size: 13px; }
    }
  </style>
</head>

      const list = visibleQuotes();
      currentQuote = ((next % list.length) + list.length) % list.length;
      clearTimeout(fadeTimer);

        els.quoteCard.classList.remove('is-fading');

      scheduleRotation();
    }

      renderStaticText();
