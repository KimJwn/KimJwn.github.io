    function globalWordcloudBucket() {
      const global = wordcloudPayload && wordcloudPayload.global ? wordcloudPayload.global : {};
      if (globalWordcloudView === 'source') return global.official_law_text || null;
      if (globalWordcloudView === 'context') return global.context_layer_text_kor || null;
      return global.official_law_text_kor || null;

    function renderGlobalWordcloud() {
      const t = T[lang()];
      if (!globalWordcloudTerms) return;
      Array.from(globalWordcloudSwitch.querySelectorAll('[data-wordcloud-view]')).forEach((btn) => {
        btn.classList.toggle('active', btn.getAttribute('data-wordcloud-view') === globalWordcloudView);
      });
      let bucket = globalWordcloudBucket();
      if ((!bucket || !bucket.length) && globalWordcloudView === 'kor') {
        bucket = wordcloudPayload && wordcloudPayload.global ? wordcloudPayload.global.official_law_text : null;
      }
      const terms = Array.isArray(bucket) ? bucket.slice(0, 76) : [];
      if (!terms.length) {
        globalWordcloudTerms.className = 'wordcloud-empty';
        globalWordcloudTerms.textContent = t.globalWordcloudEmpty;
        return;
      }
      const scope = wordcloudPayload && wordcloudPayload.scope ? wordcloudPayload.scope : {};
      const rows = Number(globalWordcloudView === 'context' ? scope.context_rows : scope.core_official_law_rows) || 0;
      document.getElementById('globalWordcloudNote').textContent =
        `${t.globalWordcloudNote} · ${t.globalWordcloudMeta.replace('{rows}', rows.toLocaleString(lang() === 'ko' ? 'ko-KR' : 'en-US'))}`;
      const palette = ['#12355b', '#0b6e69', '#b7791f', '#7c2d12', '#334155', '#1d4ed8', '#0f766e'];
      const max = Math.max(...terms.map((term) => Number(term.value) || 0), 1);
      globalWordcloudTerms.className = 'wordcloud-terms';
      globalWordcloudTerms.innerHTML = terms.map((term, index) => {
        const value = Number(term.value) || 0;
        const weight = Math.sqrt(value / max);
        const size = 0.78 + weight * 2.35;
        const color = palette[index % palette.length];
        const tilt = index % 8 === 0 ? -2 : (index % 7 === 0 ? 2 : 0);
        const title = `${term.text || ''}: ${value}`;
        return `<span class="wordcloud-term" title="${esc(title)}" style="--term-size:${size.toFixed(2)}rem;--term-color:${color};--term-tilt:${tilt}deg;">${esc(term.text || '')}</span>`;
      }).join('');
    }

    function dimensionShortLabel(value) {
      const labels = {
        ko: {
          'scope/coverage': '범위',
          'disclosure/labeling': '표시',
          'remedies/consent': '구제/동의',
          elections: '선거',

          'platform duties': '플랫폼',
        },

          'scope/coverage': 'Scope',
          'disclosure/labeling': 'Labeling',
          'remedies/consent': 'Remedies',
          elections: 'Elections',
          'criminalize/penalty': 'Penalty',
          'platform duties': 'Platform',
        },
      };
      return (labels[lang()] && labels[lang()][value]) || value;
    }

    const SCORE_AXES = [
      ['scope_coverage', 'scope/coverage'],
      ['disclosure_labeling', 'disclosure/labeling'],
      ['remedies_consent', 'remedies/consent'],
      ['elections', 'elections'],
      ['criminalize_penalty', 'criminalize/penalty'],
      ['platform_duties', 'platform duties'],
    ];

    function scoreVector(item) {
      return SCORE_AXES.map(([key]) => Number((item.governance_scores || {})[key] || 0));
    }

    function pairDistance(a, b) {
      const av = scoreVector(a);
      const bv = scoreVector(b);
      return Math.sqrt(av.reduce((sum, cur, i) => sum + ((cur - bv[i]) ** 2), 0));
    }

    function pairAxes(a, b) {
      const av = scoreVector(a);
      const bv = scoreVector(b);
      return SCORE_AXES.map(([, label], i) => ({
        label,
        delta: Math.abs(av[i] - bv[i]),
        mean: (av[i] + bv[i]) / 2,
      }));
    }

    function deepCard(title, pair, mode) {
      const t = T[lang()];
      if (!pair) return '';
      const axes = pairAxes(pair.a, pair.b).sort((x, y) => mode === 'close' ? x.delta - y.delta : y.delta - x.delta).slice(0, 3);
      const axisTitle = mode === 'close' ? t.deepCloseAxes : t.deepDivergeAxes;
      return `
        <article class="deep-card">
          <h4>${esc(title)}</h4>
          <div class="deep-pair">
            <span class="deep-country">${esc(governanceCountryLabel(pair.a.country))}</span>
            <span class="deep-arrow">↔</span>
            <span class="deep-country">${esc(governanceCountryLabel(pair.b.country))}</span>
          </div>
          <p class="deep-copy">${esc(pair.note)} ${esc(t.deepDistance)} ${pair.distance.toFixed(1)}.</p>
          <div class="deep-axis-list" aria-label="${esc(axisTitle)}">
            ${axes.map((axis) => `
              <div class="deep-axis-row">
                <span class="deep-axis-name">${esc(dimensionShortLabel(axis.label))}</span>
                <span class="deep-axis-track"><span class="deep-axis-fill" style="width:${Math.max(4, Math.min(100, mode === 'close' ? axis.mean : axis.delta))}%"></span></span>
                <span class="deep-axis-value">${(mode === 'close' ? axis.mean : axis.delta).toFixed(1)}</span>
              </div>
            `).join('')}
          </div>
        </article>
      `;
    }

    function renderDeepSimilarity() {
      const t = T[lang()];
      const rows = Object.values((governanceScores && governanceScores.countries) || {}).filter((row) => row && row.country);
      if (rows.length < 2) {
        deepSimHost.innerHTML = `<p class="deep-empty">${esc(t.deepNoData)}</p>`;
        return;
      }
      const pairs = [];
      for (let i = 0; i < rows.length; i += 1) {
        for (let j = i + 1; j < rows.length; j += 1) {
          const a = rows[i];
          const b = rows[j];
          const distance = pairDistance(a, b);
          pairs.push({
            a,
            b,
            distance,
            sameType: a.governance_type === b.governance_type,
            bothStrong: !String(a.evidence_strength || '').includes('thin') && !String(b.evidence_strength || '').includes('thin'),
          });
        }
      }
      const sameTypeDivergence = pairs
        .filter((pair) => pair.sameType)
        .sort((a, b) => b.distance - a.distance)[0];
      const crossTypeSimilarity = pairs
        .filter((pair) => !pair.sameType)
        .sort((a, b) => a.distance - b.distance)[0];
      const bridgePair = pairs
        .filter((pair) => !pair.sameType && pair.bothStrong)
        .sort((a, b) => {
          const ag = Math.max(Number((a.a.governance_scores || {}).voluntary_guidance || 0), Number((a.b.governance_scores || {}).voluntary_guidance || 0));
          const bg = Math.max(Number((b.a.governance_scores || {}).voluntary_guidance || 0), Number((b.b.governance_scores || {}).voluntary_guidance || 0));
          return (bg - ag) || (a.distance - b.distance);
        })[0] || crossTypeSimilarity;
      if (sameTypeDivergence) sameTypeDivergence.note = lang() === 'ko'
        ? '같은 거버넌스 유형으로 묶이지만 점수 프로필은 이 축들에서 크게 갈립니다.'
        : 'They share a governance type, but the score profile splits on these axes.';
      if (crossTypeSimilarity) crossTypeSimilarity.note = lang() === 'ko'
        ? '거버넌스 유형은 다르지만 실제 기능축은 가깝게 움직입니다.'
        : 'They sit in different governance types but move closely on functional axes.';
      if (bridgePair) bridgePair.note = lang() === 'ko'
        ? '법 기반 유형과 guidance/context 기반 유형을 이어 읽을 때 좋은 비교쌍입니다.'
        : 'This pair is useful for reading across legal-force and guidance/context pathways.';
      deepSimHost.innerHTML = [
        deepCard(t.deepSameType, sameTypeDivergence, 'diverge'),
        deepCard(t.deepCrossType, crossTypeSimilarity, 'close'),
        deepCard(t.deepBridge, bridgePair, 'close'),
      ].filter(Boolean).join('') || `<p class="deep-empty">${esc(t.deepNoData)}</p>`;
    }

    function renderDimensionSimilarity() {
      const t = T[lang()];
      const rows = Object.values((governanceScores && governanceScores.countries) || {})
        .filter((row) => row && row.country && row.governance_scores)
        .sort((a, b) => governanceCountryLabel(a.country).localeCompare(governanceCountryLabel(b.country), lang() === 'ko' ? 'ko' : 'en'));
      if (rows.length < 2) {
        dimSimCountry.innerHTML = '';
        dimSimOverallHost.innerHTML = `<p class="dim-empty">${esc(t.dimSimNoData)}</p>`;
        dimSimHeatmapHost.innerHTML = `<p class="dim-empty">${esc(t.dimSimNoData)}</p>`;
        dimSimAxisHost.innerHTML = `<p class="dim-empty">${esc(t.dimSimNoData)}</p>`;
        return;
      }
      if (!rows.some((row) => row.country === dimSimSelection)) dimSimSelection = rows[0].country;
      dimSimCountry.innerHTML = rows.map((row) => {
        const selected = row.country === dimSimSelection ? ' selected' : '';
        return `<option value="${esc(row.country)}"${selected}>${esc(governanceCountryLabel(row.country))}</option>`;
      }).join('');

      const base = rows.find((row) => row.country === dimSimSelection) || rows[0];
      const otherRows = rows.filter((row) => row.country !== base.country);
      const heatColor = (gap, minGap, maxGap) => {
        const normalizedGap = (gap - minGap) / Math.max(0.001, maxGap - minGap);
        const closeness = 1 - Math.max(0, Math.min(1, normalizedGap));
        const boosted = Math.pow(closeness, 1.9);
        return {
          bg: `hsl(263 ${(30 + (boosted * 58)).toFixed(1)}% ${(98 - (boosted * 70)).toFixed(1)}%)`,
          text: boosted >= 0.48 ? '#fff' : '#312e81',
        };
      };
      const overallPeers = otherRows
        .map((row) => ({ row, distance: pairDistance(base, row) }))
        .sort((a, b) => a.distance - b.distance);
      const topOverallPeers = overallPeers.slice(0, 3);
      const maxOverall = Math.max(...topOverallPeers.map((peer) => peer.distance), 1);
      dimSimOverallHost.innerHTML = topOverallPeers.map((peer, index) => {
        const closeness = 100 - ((peer.distance / maxOverall) * 72);
        return `
          <article class="dim-peer-card">
            <div class="dim-peer-head">
              <h4 class="dim-peer-title">${index + 1}. ${esc(governanceCountryLabel(peer.row.country))}</h4>
              <span class="dim-peer-score">${esc(peer.row.governance_type || '-')}</span>
            </div>
            <div class="dim-peer-row">
              <span class="dim-peer-name">${esc(t.dimSimDistance)}</span>
              <span class="dim-peer-track"><span class="dim-peer-fill" style="width:${Math.max(4, Math.min(100, closeness))}%"></span></span>
              <span class="dim-peer-gap">${peer.distance.toFixed(1)}</span>
            </div>
          </article>
        `;
      }).join('');

      const heatRows = overallPeers.slice(0, 8);
      const heatGaps = heatRows.flatMap((peer) => {
        const baseVector = scoreVector(base);
        const peerVector = scoreVector(peer.row);
        return SCORE_AXES.map(([,], i) => Math.abs(baseVector[i] - peerVector[i]));
      });
      const minHeatGap = Math.min(...heatGaps, 0);
      const maxHeatGap = Math.max(...heatGaps, 1);
      const closestOverallText = topOverallPeers
        .map((peer) => `${governanceCountryLabel(peer.row.country)} (${peer.distance.toFixed(1)})`)
        .join(', ');
      const closestByDimension = SCORE_AXES.map(([key, label]) => {
        const baseScore = Number((base.governance_scores || {})[key] || 0);
        const nearest = otherRows
          .map((row) => ({
            row,
            gap: Math.abs(baseScore - Number((row.governance_scores || {})[key] || 0)),
          }))
          .sort((a, b) => a.gap - b.gap)[0];
        return `${dimensionShortLabel(label)}=${governanceCountryLabel(nearest.row.country)} (${nearest.gap.toFixed(1)})`;
      }).join('; ');
      dimSimHeatmapHost.innerHTML = `
        <div class="dim-heat-table">
          <div class="dim-heat-row dim-heat-head">
            <span>${esc(t.dimSimCountry)}</span>
            ${SCORE_AXES.map(([, label]) => `<span>${esc(dimensionShortLabel(label))}</span>`).join('')}
            <span>${esc(t.dimSimDistance)}</span>
          </div>
          ${heatRows.map((peer) => {
            const baseVector = scoreVector(base);
            const peerVector = scoreVector(peer.row);
            return `
              <div class="dim-heat-row">
                <span class="dim-heat-country">${esc(governanceCountryLabel(peer.row.country))}</span>
                ${SCORE_AXES.map(([, label], i) => {
                  const gap = Math.abs(baseVector[i] - peerVector[i]);
                  const color = heatColor(gap, minHeatGap, maxHeatGap);
                  return `<span class="dim-heat-cell" title="${esc(dimensionShortLabel(label))}: ${gap.toFixed(1)}" style="background:${color.bg}; color:${color.text}">${gap.toFixed(1)}</span>`;
                }).join('')}
                <span class="dim-heat-distance">${peer.distance.toFixed(1)}</span>
              </div>
            `;
          }).join('')}
          <div class="dim-heat-row">
            <div class="dim-heat-summary">
              <strong>${esc(t.dimSimHeatmapGuide)}</strong><br>
              ${esc(t.dimSimClosestOverall)}: ${esc(closestOverallText)}<br>
              ${esc(t.dimSimClosestByDimension)}: ${esc(closestByDimension)}
            </div>
          </div>
        </div>
        <div class="dim-spectrum" aria-label="${esc(t.dimSimHeatmapGuide)}">
          <p class="dim-spectrum-label">${esc(t.dimSimSpectrumHigh)}<span class="dim-spectrum-gap">${esc(t.dimSimGap)} ${minHeatGap.toFixed(1)}</span></p>
          <div class="dim-spectrum-bar" style="background:linear-gradient(180deg, ${heatColor(minHeatGap, minHeatGap, maxHeatGap).bg} 0%, ${heatColor((minHeatGap + maxHeatGap) / 2, minHeatGap, maxHeatGap).bg} 48%, ${heatColor(maxHeatGap, minHeatGap, maxHeatGap).bg} 100%)"></div>
          <p class="dim-spectrum-label">${esc(t.dimSimSpectrumLow)}<span class="dim-spectrum-gap">${esc(t.dimSimGap)} ${maxHeatGap.toFixed(1)}</span></p>
        </div>
      `;

      dimSimAxisHost.innerHTML = SCORE_AXES.map(([key, label]) => {
        const baseScore = Number((base.governance_scores || {})[key] || 0);
        const peers = otherRows
          .map((row) => {
            const score = Number((row.governance_scores || {})[key] || 0);
            return { row, score, gap: Math.abs(baseScore - score) };
          })
          .sort((a, b) => a.gap - b.gap)
          .slice(0, 3);
        const maxGap = Math.max(...peers.map((peer) => peer.gap), 1);
        return `
          <article class="dim-peer-card">
            <div class="dim-peer-head">
              <h4 class="dim-peer-title">${esc(dimensionShortLabel(label))}</h4>
              <span class="dim-peer-score">${esc(t.dimSimBaseScore)} ${baseScore.toFixed(1)}</span>
            </div>
            <div class="dim-peer-list">
              ${peers.map((peer) => {
                const closeness = 100 - ((peer.gap / maxGap) * 72);
                return `
                  <div class="dim-peer-row">
                    <span class="dim-peer-name">${esc(governanceCountryLabel(peer.row.country))}</span>
                    <span class="dim-peer-track"><span class="dim-peer-fill" style="width:${Math.max(4, Math.min(100, closeness))}%"></span></span>
                    <span class="dim-peer-gap">${esc(t.dimSimGap)} ${peer.gap.toFixed(1)}</span>
                  </div>
                `;
              }).join('')}
            </div>
          </article>
        `;
      }).join('');
    }

    function governanceReviewStatus(item) {
      const t = T[lang()];
      const strength = String(item.evidence_strength || '');
      if (strength.includes('thin') || strength.includes('review')) {
        return { label: t.govStatusReview, cls: 'review' };

      if (Number(item.context_guidance_score || 0) > 0 || Number(item.context_rows || 0) > 0) {
        return { label: t.govStatusContext, cls: 'context' };
      }
      return { label: t.govStatusOk, cls: '' };
    }

    async function loadWorkbook(sheetName) {
      const t = T[lang()];
      wbHost.innerHTML = `<p class="wb-empty">${esc(t.wbLoading)}</p>`;
      try {
        const resp = await fetch('/api-static/summary-workbook.json');
        if (!resp.ok) throw new Error('workbook fetch failed');
        const json = await resp.json();
        workbookSheetNames = Array.isArray(json.sheets) ? json.sheets : [];
        workbookSelectedSheet = json.selectedSheet || workbookSheetNames[0] || '';
        renderWorkbookOptions();
        wbHost.innerHTML = json.html || `<p class="wb-empty">${esc(t.wbEmpty)}</p>`;
      } catch (e) {
        wbHost.innerHTML = `<p class="wb-empty">${esc(t.wbError)}</p>`;
      }
    }

    function pickLine(md, labels) {
      const lines = String(md || '').split('\n');
      for (const raw of lines) {
        const line = raw.trim();
        if (!line.startsWith('-')) continue;
        for (const label of labels) {
          if (line.includes('`' + label + '`')) return line.replace(/^\-\s*/, '');
        }
      }
      return '';
    }

    function pickRefs(md) {
      const lines = String(md || '').split('\n');
      const out = [];
      for (const raw of lines) {
        const line = raw.trim();
        if (/^Ref\d+:/i.test(line)) out.push(line);
      }
      return out.slice(0, 3);
    }

    function shortName(p) {
      const s = String(p || '');
      if (!s) return '';
      const i = Math.max(s.lastIndexOf('/'), s.lastIndexOf('\\'));
      return i >= 0 ? s.slice(i + 1) : s;
    }

    async function renderEvidence() {
      const t = T[lang()];
      evHost.innerHTML = `<p class="ev-empty">${esc(t.evLoading)}</p>`;
      try {
        const countriesResp = await fetch('/api-static/countries.json');
        const countriesJson = await countriesResp.json();
        const countries = Array.isArray(countriesJson.countries) ? countriesJson.countries : [];
        const cards = [];
        for (const country of countries) {
          const [resp, evResp] = await Promise.all([
            fetch(`/api-static/summary/${encodeURIComponent(country)}.${lang()}.md`),
            fetch(`/api-static/evidence-map/${encodeURIComponent(country)}.json`),
          ]);
          if (!resp.ok) continue;
          const md = await resp.text();
          const evJson = evResp.ok ? await evResp.json() : { refs: [] };
          const evRefs = Array.isArray(evJson.refs) ? evJson.refs : [];
          const labeling = pickLine(md, ['Labeling status', '라벨링(표시) 법제화 상태']);
          const consent = pickLine(md, ['Non-consensual deepfake status', '동의 없는 딥페이크 법제화 상태']);
          const penalty = pickLine(md, ['Penalty/sanctions codification status', '처벌 법제화 상태']);
          const refs = pickRefs(md);
          const firstUse = evRefs.find((r) => Array.isArray(r.uses) && r.uses.length)?.uses?.[0] || '';
          const locators = evRefs
            .slice(0, 2)
            .map((r) => `${r.ref}: ${shortName(r.source)}`)
            .filter(Boolean);
          const countryLabel = lang() === 'en' ? (countryLabelMap[country] || country) : country;
          cards.push(`
            <article class="ev-card">
              <h3 class="ev-country">${esc(countryLabel)}</h3>
              ${labeling ? `<p class="ev-dim">${esc(labeling)}</p>` : ''}
              ${consent ? `<p class="ev-dim">${esc(consent)}</p>` : ''}
              ${penalty ? `<p class="ev-dim">${esc(penalty)}</p>` : ''}
              ${firstUse ? `<p class="ev-special"><strong>${esc(t.evSpecial)}:</strong> ${esc(firstUse)}</p>` : ''}
              ${locators.map((l) => `<p class="ev-loc"><strong>${esc(t.evLocator)}:</strong> ${esc(l)}</p>`).join('')}
              ${(refs || []).map((r) => `<p class="ev-ref">${esc(r)}</p>`).join('')}
            </article>
          `);
        }
        evHost.innerHTML = cards.length ? cards.join('') : `<p class="ev-empty">${esc(t.evEmpty)}</p>`;
      } catch (e) {
        evHost.innerHTML = `<p class="ev-empty">${esc(t.evEmpty)}</p>`;
      }
    }
