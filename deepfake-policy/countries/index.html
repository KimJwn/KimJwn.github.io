    function emptyStats() { return { total: 0, in_force: 0, proposed: 0, guidelines: 0, review: 0 }; }

      for (const doc of documents || []) {

    function totalTimelineEvents(row) {
      if (!row) return 0;
      return Number(row.in_force || 0) + Number(row.proposed || 0) + Number(row.guidelines || 0) + Number(row.unknown || 0);
    }
    function dominantStage(row) {
      const ranked = [
        ['in_force', Number(row.in_force || 0)],
        ['proposed', Number(row.proposed || 0)],
        ['guidelines', Number(row.guidelines || 0)],
        ['unknown', Number(row.unknown || 0)],
      ].sort((a, b) => b[1] - a[1]);
      return ranked[0][1] > 0 ? ranked[0][0] : 'unknown';
    }
    function timelineTitle(year, row) {
      const parts = [];
      if (row.in_force) parts.push(`in_force ${row.in_force}`);
      if (row.proposed) parts.push(`proposed ${row.proposed}`);
      if (row.guidelines) parts.push(`guidelines ${row.guidelines}`);
      if (row.unknown) parts.push(`review ${row.unknown}`);
      return `${year}: ${parts.join(', ') || 'no events'}`;
    }

      const count = total > 1 ? `<span class="tl-count">x${total}</span>` : '';

      return `<span class="tl-node tl-${stage}${extra}" title="${escapeHtml(titleText || String(year))}">${year}${count}</span>`;

    function buildDimensionAverages() {
      const dims = [
        { key: 'labeling_level', label: text().labeling },
        { key: 'election_level', label: text().election },
        { key: 'non_consensual_level', label: text().non },
        { key: 'provider_liability_level', label: text().provider },
        { key: 'penalty_level', label: text().penalty },
      ];
      const rows = dims.map((d) => {
        let sum = 0; let n = 0;
        for (const s of statuses) {
          const v = levelToScore(s[d.key]);
          if (v === null) continue;
          sum += v; n += 1;
        }
        return { name: d.label, avg: n ? (sum / n) : 0 };
      });
      return rows.sort((a, b) => b.avg - a.avg);
    }

    function hexToRgb(hex) {
      const h = String(hex || '').replace('#', '');
      const norm = h.length === 3 ? h.split('').map((c) => c + c).join('') : h;
      const n = parseInt(norm, 16);
      if (!Number.isFinite(n)) return { r: 156, g: 163, b: 175 };
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }
    function mixHex(a, b, t) {
      const x = Math.max(0, Math.min(1, t));
      const ca = hexToRgb(a);
      const cb = hexToRgb(b);
      const r = Math.round(ca.r + (cb.r - ca.r) * x);
      const g = Math.round(ca.g + (cb.g - ca.g) * x);
      const b2 = Math.round(ca.b + (cb.b - ca.b) * x);
      return `rgb(${r},${g},${b2})`;
    }
    function dimensionFillColors(avg) {
      if (avg <= 0) return ['#9ca3af', '#9ca3af'];
      let base;
      if (avg <= 2) {
        base = mixHex('#9ca3af', '#ef4444', avg / 2);
      } else {
        base = mixHex('#ef4444', '#16a34a', (avg - 2) / 2);
      }
      const hi = mixHex(base, '#ffffff', 0.22);
      return [hi, base];
    }

    function renderDimensionAverages() {
      const rows = buildDimensionAverages();
      dimRowsEl.innerHTML = rows.map((r) => {
        const width = Math.max(0, Math.min(100, (r.avg / 4) * 100));
        const fillWidth = r.avg <= 0 ? 1.5 : width;
        const [c1, c2] = dimensionFillColors(r.avg);
        return `<div class="dim-row"><span class="dim-name">${escapeHtml(r.name)}</span><div class="dim-bar"><div class="dim-fill" style="width:${fillWidth.toFixed(2)}%;--dim-fill:linear-gradient(90deg,${c1} 0%,${c2} 100%);"></div></div><span class="dim-score">${r.avg.toFixed(2)}/4</span></div>`;
      }).join('');
      return rows;
    }

      }
      const cardHtml = (c) => {
        const s = statusMap.get(c) || {};
        return `<article class="country" data-country="${escapeHtml(c)}"><h3>${escapeHtml(countryLabel(c))}</h3><div class="metrics"><div class="metric"><span class="k">${escapeHtml(t.labeling)}</span>${pill(s.labeling_level)}</div><div class="metric"><span class="k">${escapeHtml(t.election)}</span>${pill(s.election_level)}</div><div class="metric"><span class="k">${escapeHtml(t.non)}</span>${pill(s.non_consensual_level)}</div><div class="metric"><span class="k">${escapeHtml(t.provider)}</span>${pill(s.provider_liability_level)}</div><div class="metric"><span class="k">${escapeHtml(t.penalty)}</span>${pill(s.penalty_level)}</div></div></article>`;
      };
      const sections = CONTINENT_ORDER
        .map((key) => {
          const list = grouped.get(key) || [];
          if (!list.length) return '';
          const avg = continentAverage(list, statusMap);
          const band = avgBand(avg);
          const avgText = avg === null ? '-' : `${avg.toFixed(2)}/4`;
          return `<section class="continent-wrap continent-${key}">
            <div class="continent-head">
              <p class="continent-title">${escapeHtml(continentName(key, t))}</p>
              <span class="continent-count">${list.length} · <i class="avg-dot avg-${band}"></i>${escapeHtml(t.continentAvg)} ${escapeHtml(avgText)}</span>
            </div>
            <div class="grid">${list.map(cardHtml).join('')}</div>
          </section>`;
        })
        .filter(Boolean);

      const col1 = [];
      const col2 = [];
      sections.forEach((html, idx) => {
        if (idx % 2 === 0) col1.push(html);
        else col2.push(html);
      });
      continentHostEl.innerHTML = `<div class="continent-col">${col1.join('')}</div><div class="continent-col">${col2.join('')}</div>`;

      emptyEl.style.display = filtered.length ? 'none' : 'block';
      emptyEl.textContent = t.empty;
      continentHostEl.querySelectorAll('.country').forEach((el) => el.addEventListener('click', () => openCountry(el.getAttribute('data-country'))));
    }

    async function fetchDocStats() {
      try {
        const res = await fetch('/api-static/dashboard-summary.json');
        if (!res.ok) throw new Error('failed');
        const json = await res.json();
        const summary = json.summary || {};
        docStats = new Map(countries.map((c) => [c, (summary[c] && summary[c].stats) || emptyStats()]));
        docTimeline = new Map(countries.map((c) => [c, (summary[c] && summary[c].timeline) || {}]));
      } catch (_) {
        docStats = new Map(countries.map((c) => [c, emptyStats()]));
        docTimeline = new Map(countries.map((c) => [c, {}]));
      }
    }

    async function loadStatuses() {
      const sRes = await fetch(`/api-static/statuses.${encodeURIComponent(lang())}.json`);
      statuses = sRes.ok ? (await sRes.json()).statuses || [] : [];
    }

    async function boot() {
      titleEl.textContent = text().loading;
      const cRes = await fetch('/api-static/countries.json');
      countries = cRes.ok ? (await cRes.json()).countries || [] : [];
      await Promise.all([loadStatuses(), fetchDocStats()]);
      render();
    }

    uiLang.addEventListener('change', async () => { saveLang(); await loadStatuses(); render(); });
    searchEl.addEventListener('input', render);
    saveLang();
    boot();
  </script>
  <script src="/deepfake-policy/dashboard-shell.js?v=20260701-sidebar6"></script>
</body>
