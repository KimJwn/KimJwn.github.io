<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dashboard overview for the Deepfake Policy Observatory, including KPI cards, regulatory fragmentation, geographic memos, word clouds, and coding charts." />
  <link rel="canonical" href="https://kimjwn.github.io/deepfake-policy/dashboard/" />
  <meta property="og:title" content="Deepfake Policy Dashboard" />
  <meta property="og:description" content="Review project-level policy indicators, regulatory pathways, geographic memo cards, and clause-coding distributions." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kimjwn.github.io/deepfake-policy/dashboard/" />
  <title>Deepfake Policy Dashboard</title>
  <link rel="stylesheet" href="/assets/palette.css" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --ink: #111827;
      --muted: #667085;
      --line: rgba(15, 23, 42, .08);
      --paper: rgba(255, 255, 255, .84);
      --paper-strong: #fffdf8;
      --navy: #0f172a;
      --gold: #b87516;
      --gold-soft: #fff4df;
      --blue: #5577a6;
      --blue-soft: #eef5ff;
      --green: #4d8b5a;
      --green-soft: #eef8ee;
      --red: #b9564d;
      --red-soft: #fff0ee;
    }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Poppins", "Noto Sans KR", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 6%, rgba(184, 117, 22, 0.10), transparent 25%),
        linear-gradient(180deg, #f5f3ee 0%, #fbfaf7 100%);
    }
    .wrap {
      max-width: 1520px;
      margin: 0 auto;
      padding: 28px;
    }
    .geo-hero,
    .dashboard-section,
    .kpi-card,
    .chart-card,
    .geo-map-card,
    .memo-card {
      border: 1px solid transparent;
      border-radius: 28px;
      background: var(--paper);
    }
    .geo-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: start;
      padding: 30px;
      margin-bottom: 22px;
    }
    .eyebrow {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(38px, 5vw, 68px);
      line-height: .98;
      letter-spacing: -.07em;
    }
    .lead {
      max-width: 920px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.72;
    }
    .geo-lang {
      display: none;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 18px;
    }
    .section-head h2 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      letter-spacing: -.055em;
    }
    .section-head p {
      max-width: 780px;
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
    }
    .section-kicker {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      padding: 8px 12px;
      background: var(--gold-soft);
      color: #6f450a;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .dashboard-section {
      padding: 26px;
      margin-bottom: 22px;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }
    .kpi-card {
      min-height: 156px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 14px;
    }
    .kpi-card strong {
      display: block;
      font-size: clamp(28px, 3.8vw, 46px);
      line-height: .95;
      letter-spacing: -.065em;
    }
    .kpi-card span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      line-height: 1.42;
    }
    .kpi-card small {
      display: block;
      margin-top: 8px;
      color: #98a2b3;
      font-size: 11px;
      font-weight: 750;
      line-height: 1.45;
    }
    .kpi-split {
      display: grid;
      gap: 8px;
    }
    .split-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    .split-row b {
      color: var(--ink);
      font-size: 14px;
    }
    .fragment-grid {
      display: grid;
      grid-template-columns: minmax(0, .82fr) minmax(0, 1.18fr);
      gap: 18px;
      align-items: start;
    }
    .fragment-copy {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.78;
    }
    .pathway-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .pathway-card {
      border-radius: 22px;
      padding: 16px;
      background: var(--paper-strong);
    }
    .pathway-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .pathway-card h3 {
      margin: 0;
      font-size: 15px;
      letter-spacing: -.025em;
    }
    .pathway-card strong {
      color: var(--gold);
      font-size: 22px;
      letter-spacing: -.04em;
    }
    .pathway-card p {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }
    .geo-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(360px, .85fr);
      gap: 22px;
      align-items: start;
      margin-bottom: 22px;
    }
    .geo-map-card {
      padding: 24px;
    }
    .map-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }
    .map-head h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -.04em;
    }
    .map-note {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }
    .memo-count {
      border-radius: 999px;
      padding: 9px 12px;
      background: #eef2f7;
      color: var(--navy);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }
    .map-stage {
      position: relative;
      min-height: 590px;
      overflow: hidden;
      border-radius: 24px;
      background:
        radial-gradient(circle at 18% 42%, rgba(184,117,22,.18), transparent 0 9%, transparent 10%),
        radial-gradient(circle at 50% 35%, rgba(15,23,42,.09), transparent 0 13%, transparent 14%),
        radial-gradient(circle at 72% 47%, rgba(184,117,22,.13), transparent 0 11%, transparent 12%),
        linear-gradient(135deg, #eef2f7 0%, #fbfaf7 54%, #f2eadc 100%);
    }
    .policy-map {
      position: absolute;
      inset: 0;
    }
    .mapcn-badge {
      position: absolute;
      left: 14px;
      top: 14px;
      z-index: 2;
      border-radius: 999px;
      padding: 8px 11px;
      background: rgba(255,255,255,.86);
      color: var(--navy);
      font-size: 12px;
      font-weight: 900;
      backdrop-filter: blur(12px);
    }
    .map-marker {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 2px solid rgba(255,255,255,.92);
      border-radius: 999px;
      background: var(--navy);
      color: #fff;
      font-size: 11px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(15,23,42,.18);
      transform: translateY(0);
      transition: transform .18s ease, background .18s ease;
    }
    .map-marker:hover,
    .map-marker.is-open {
      background: var(--gold);
      transform: translateY(-2px);
    }
    .maplibregl-popup-content {
      border-radius: 16px;
      border: 0;
      padding: 10px 12px;
      color: var(--navy);
      font-family: "Poppins", "Noto Sans KR", "Segoe UI", sans-serif;
      font-size: 12px;
      font-weight: 850;
      box-shadow: 0 14px 34px rgba(15,23,42,.14);
    }
    .maplibregl-ctrl-group {
      border: 0 !important;
      border-radius: 14px !important;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(15,23,42,.12) !important;
    }
    .map-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(15,23,42,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15,23,42,.05) 1px, transparent 1px);
      background-size: 58px 58px;
      mask-image: radial-gradient(circle, #000 55%, transparent 95%);
      opacity: .5;
    }
    .continent-label {
      position: absolute;
      color: rgba(17,24,39,.32);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      pointer-events: none;
    }
    .pin {
      position: absolute;
      left: var(--x);
      top: var(--y);
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      width: 35px;
      height: 35px;
      border: 0;
      border-radius: 999px;
      background: var(--navy);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }
    .pin.is-open {
      background: var(--gold);
    }
    .pin::after {
      content: attr(data-label);
      position: absolute;
      left: 50%;
      top: 38px;
      transform: translateX(-50%);
      padding: 5px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.86);
      color: var(--ink);
      font-size: 11px;
      white-space: nowrap;
    }
    .memo-panel {
      display: grid;
      gap: 14px;
    }
    .memo-card {
      padding: 20px;
    }
    .memo-card h3 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -.04em;
    }
    .memo-card p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.62;
      font-size: 14px;
    }
    .memo-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 14px;
    }
    .memo-chip {
      display: inline-flex;
      border-radius: 999px;
      padding: 7px 9px;
      background: #eef2f7;
      color: #344054;
      font-size: 12px;
      font-weight: 850;
    }
    .memo-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-top: 16px;
    }
    .memo-detail,
    .memo-close {
      border: 0;
      border-radius: 999px;
      padding: 10px 13px;
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
    }
    .memo-detail {
      background: var(--navy);
      color: #fff;
    }
    .memo-close {
      background: #eef2f7;
      color: var(--navy);
      cursor: pointer;
    }
    .memo-empty {
      padding: 28px;
      border-radius: 28px;
      background: rgba(255,255,255,.66);
      color: var(--muted);
      line-height: 1.7;
    }
    .wordcloud-card {
      background:
        radial-gradient(circle at 12% 14%, rgba(184,117,22,.12), transparent 28%),
        var(--paper);
    }
    .wordcloud-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .wordcloud-tools button {
      border: 0;
      border-radius: 999px;
      padding: 9px 12px;
      background: #eef2f7;
      color: var(--navy);
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }
    .wordcloud-tools button.is-active {
      background: var(--navy);
      color: #fff;
    }
    .wordcloud-cloud {
      min-height: 270px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px 16px;
      padding: 18px 4px 4px;
    }
    .word-term {
      display: inline-flex;
      align-items: center;
      color: var(--navy);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -.04em;
      opacity: var(--alpha);
      transform: rotate(var(--rot));
    }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 22px;
    }
    .chart-card {
      padding: 22px;
    }
    .chart-card h2 {
      margin: 0 0 14px;
      font-size: 22px;
      letter-spacing: -.045em;
    }
    .bar-list,
    .timeline-list {
      display: grid;
      gap: 12px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: minmax(120px, .45fr) minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      color: #344054;
      font-size: 12px;
      font-weight: 850;
    }
    .bar-track {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: #eef2f7;
    }
    .bar-fill {
      height: 100%;
      width: var(--w);
      border-radius: inherit;
      background: var(--bar, var(--gold));
    }
    .stacked-row {
      display: grid;
      grid-template-columns: minmax(120px, .36fr) minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      color: #344054;
      font-size: 12px;
      font-weight: 850;
    }
    .stacked-track {
      display: flex;
      height: 14px;
      overflow: hidden;
      border-radius: 999px;
      background: #eef2f7;
    }
    .stack-seg {
      width: var(--w);
      min-width: 2px;
      background: var(--c);
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    .legend i {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--c);
    }
    .timeline-card {
      margin-bottom: 0;
    }
    .timeline-row {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      color: #344054;
      font-size: 12px;
      font-weight: 850;
    }
    .loading {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    @media (max-width: 1180px) {
      .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .fragment-grid,
      .chart-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 980px) {
      .wrap { padding: 14px; }
      .geo-hero,
      .geo-layout,
      .section-head { grid-template-columns: 1fr; }
      .geo-layout { grid-template-columns: 1fr; }
      .map-stage { min-height: 520px; }
      .kpi-grid { grid-template-columns: 1fr; }
      .pathway-grid { grid-template-columns: 1fr; }
      .bar-row,
      .stacked-row,
      .timeline-row { grid-template-columns: 1fr; }
      .wordcloud-tools { justify-content: flex-start; }
    }
  </style>

</head>

  <main class="wrap">
    <section class="geo-hero">
      <div>
        <p class="eyebrow" id="eyebrow"></p>
        <h1 id="title"></h1>
        <p class="lead" id="lead"></p>

      <div class="fragment-grid">
        <p class="fragment-copy" id="fragmentCopy"></p>
        <div class="pathway-grid" id="pathwayGrid"></div>

          <div id="policyMap" class="policy-map" aria-label="Interactive policy map"></div>
          <span class="mapcn-badge">MapLibre · mapcn style</span>

      </article>
      <aside class="memo-panel" id="memoPanel"></aside>
    </section>

    <section class="dashboard-section wordcloud-card">
      <div class="section-head">
        <div>
          <h2 id="wordTitle"></h2>
          <p id="wordLead"></p>
        </div>
        <div class="wordcloud-tools" id="wordTools"></div>
      </div>
      <div class="wordcloud-cloud" id="wordCloud"></div>
    </section>

    <section class="chart-grid">
      <article class="chart-card">
        <h2 id="regionChartTitle"></h2>
        <div class="bar-list" id="regionChart"></div>
        <div class="legend" id="regionLegend"></div>
      </article>
      <article class="chart-card">
        <h2 id="policyChartTitle"></h2>
        <div class="bar-list" id="policyChart"></div>
      </article>
      <article class="chart-card">
        <h2 id="riskChartTitle"></h2>
        <div class="bar-list" id="riskChart"></div>
      </article>
      <article class="chart-card">
        <h2 id="forceChartTitle"></h2>
        <div class="bar-list" id="forceChart"></div>
        <div class="legend" id="forceLegend"></div>
      </article>
    </section>

    <section class="dashboard-section timeline-card">
      <div class="section-head">
        <div>
          <h2 id="timelineTitle"></h2>
          <p id="timelineLead"></p>
        </div>
        <span class="section-kicker" id="timelineKicker"></span>
      </div>
      <div class="timeline-list" id="timelineChart"></div>
      <div class="legend" id="timelineLegend"></div>
    </section>

    }
    function renderFallbackPins(stage, l) {
      stage.querySelectorAll('.pin').forEach((el) => el.remove());
      countries.forEach((c) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'pin' + (open.includes(c.slug) ? ' is-open' : '');
        btn.style.setProperty('--x', c.x + '%');
        btn.style.setProperty('--y', c.y + '%');
        btn.dataset.slug = c.slug;
        btn.dataset.label = l === 'ko' ? c.ko : c.en;
        btn.textContent = c.code;
        btn.addEventListener('click', () => toggle(c.slug));
        stage.appendChild(btn);
      });
    }
    function ensurePolicyMap() {
      const host = document.getElementById('policyMap');
      if (!host || policyMap || !window.maplibregl) return;
      policyMap = new maplibregl.Map({
        container: host,
        style: 'https://tiles.openfreemap.org/styles/bright',
        center: [28, 22],
        zoom: 1.15,
        attributionControl: true
      });
      policyMap.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');
      policyMap.on('load', () => {
        policyMap.fitBounds([[-130, -48], [154, 64]], { padding: 36, duration: 0 });
        renderPolicyMapMarkers();
      });
    }
    function renderPolicyMapMarkers() {
      if (!policyMap || !window.maplibregl) return;
      const l = lang();
      countries.forEach((c) => {
        let item = policyMapMarkers.get(c.slug);
        if (!item) {
          const el = document.createElement('button');
          el.type = 'button';
          el.className = 'map-marker';
          el.textContent = c.code;
          el.setAttribute('aria-label', l === 'ko' ? c.ko : c.en);
          el.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            toggle(c.slug);
          });
          const popup = new maplibregl.Popup({ offset: 18, closeButton: false, closeOnClick: false })
            .setHTML(`<strong>${esc(l === 'ko' ? c.ko : c.en)}</strong><br>${esc(c.region)}`);
          const marker = new maplibregl.Marker({ element: el, anchor: 'center' })
            .setLngLat([c.lng, c.lat])
            .setPopup(popup)
            .addTo(policyMap);
          item = { el, marker, popup };
          policyMapMarkers.set(c.slug, item);
        }
        item.el.classList.toggle('is-open', open.includes(c.slug));
        item.el.setAttribute('aria-label', l === 'ko' ? c.ko : c.en);
        item.popup.setHTML(`<strong>${esc(l === 'ko' ? c.ko : c.en)}</strong><br>${esc(c.region)}`);
      });
      if (policyMapMarkers.size) policyMap.resize();
    }
    function renderAnalytics() {
      if (!data.inventory || !data.coding) {
        document.getElementById('kpiGrid').innerHTML = `<article class="kpi-card"><span>${T[lang()].loading}</span></article>`;
        return;
      }
      renderKpis();
      renderFragmentation();
      renderWordcloud();
      renderCharts();
      renderTimeline();
    }
    function renderMap() {
      const l = lang();
      const t = T[l];
      document.documentElement.lang = l;
      document.getElementById('lang').value = l;
      document.getElementById('eyebrow').textContent = t.eyebrow;
      document.getElementById('title').textContent = t.title;
      document.getElementById('lead').textContent = t.lead;
      document.getElementById('mapTitle').textContent = t.mapTitle;
      document.getElementById('mapNote').textContent = t.mapNote;
      const stage = document.getElementById('mapStage');
      ensurePolicyMap();
      if (policyMap) {
        stage.querySelectorAll('.pin').forEach((el) => el.remove());
        renderPolicyMapMarkers();
      } else {
        renderFallbackPins(stage, l);
      }
      document.getElementById('memoCount').textContent = t.memoCount(open.length);
      const panel = document.getElementById('memoPanel');
      panel.innerHTML = open.length ? open.map((slug) => {
        const c = countries.find((item) => item.slug === slug);
        return `<article class="memo-card">
          <h3>${l === 'ko' ? c.ko : c.en}</h3>
          <p>${esc(c.note)}</p>
          <div class="memo-meta">
            <span class="memo-chip">${esc(c.region)}</span>
            <span class="memo-chip">${esc(c.status)}</span>
            <span class="memo-chip">${esc(c.dims)}</span>
          </div>
          <div class="memo-actions">
            <a class="memo-detail" href="${withLang('/deepfake-policy/country/' + c.slug + '/')}">${t.detail}</a>
            <button class="memo-close" type="button" data-close="${c.slug}">${t.close}</button>
          </div>
        </article>`;
      }).join('') : `<div class="memo-empty">${t.empty}</div>`;
      panel.querySelectorAll('[data-close]').forEach((btn) => btn.addEventListener('click', () => toggle(btn.dataset.close, true)));
    }
    function render() {
      renderMap();
      renderAnalytics();
    }
    function toggle(slug, forceClose = false) {
      if (open.includes(slug) || forceClose) open = open.filter((item) => item !== slug);
      else {
        if (open.length >= 4) open.shift();
        open.push(slug);
      }
      render();
    }
    async function loadData() {
      try {
        const [inventory, coding, wordcloud] = await Promise.all([
          fetchJson('/api-static/document-inventory.json?v=20260708-brazil1'),
          fetchJson('/api-static/coding-results.json?v=20260708-brazil1'),
          fetchJson('/api-static/analysis-wordclouds.json?v=20260708-brazil1')
        ]);
        data = { inventory, coding, wordcloud };
      } catch (err) {
        console.warn('Dashboard analytics failed to load', err);
      }
      render();
    }
    document.getElementById('lang').addEventListener('change', (event) => {
      try { localStorage.setItem(LANG_KEY, event.target.value); } catch (_) {}
      const url = new URL(location.href);
      url.searchParams.set('lang', event.target.value);
      location.href = url.pathname + url.search + url.hash;
    });
    open = ['korea', 'china'];
    render();
    loadData();
  </script>
  <script src="/deepfake-policy/dashboard-shell.js?v=20260708-brazil1"></script>
</body>
</html>
