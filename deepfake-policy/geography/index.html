<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Explore supported deepfake policy jurisdictions on a geographic dashboard with comparable country memo cards." />
  <link rel="canonical" href="https://kimjwn.github.io/deepfake-policy/geography/" />
  <meta property="og:title" content="Deepfake Policy Geography" />
  <meta property="og:description" content="Open up to four country memo cards from a geographic map and navigate to country-level deepfake policy dashboards." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kimjwn.github.io/deepfake-policy/geography/" />
  <title>Deepfake Policy Geography</title>
  <link rel="stylesheet" href="/assets/palette.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: #111827;
      font-family: "Poppins", "Noto Sans KR", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 6%, rgba(184, 117, 22, 0.10), transparent 25%),
        linear-gradient(180deg, #f5f3ee 0%, #fbfaf7 100%);
    }
    .wrap {
      max-width: 1520px;
      margin: 0 auto;
      padding: 28px;
    }
    .geo-hero,
    .geo-map-card,
    .memo-card,
    .geo-stat {
      border: 1px solid transparent;
      border-radius: 28px;
      background: rgba(255,255,255,.82);
    }
    .geo-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: start;
      padding: 30px;
      margin-bottom: 22px;
    }
    .eyebrow {
      margin: 0 0 10px;
      color: #b87516;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(38px, 5vw, 68px);
      line-height: .98;
      letter-spacing: -.07em;
    }
    .lead {
      max-width: 820px;
      margin: 18px 0 0;
      color: #667085;
      font-size: 17px;
      line-height: 1.72;
    }
    .geo-lang {
      display: none;
    }
    .geo-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }
    .geo-stat {
      padding: 22px;
    }
    .geo-stat strong {
      display: block;
      font-size: 34px;
      line-height: 1;
      letter-spacing: -.05em;
    }
    .geo-stat span {
      display: block;
      margin-top: 8px;
      color: #667085;
      font-size: 14px;
      font-weight: 800;
    }
    .geo-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(360px, .85fr);
      gap: 22px;
      align-items: start;
    }
    .geo-map-card {
      padding: 24px;
    }
    .map-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }
    .map-head h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -.04em;
    }
    .map-note {
      margin: 6px 0 0;
      color: #667085;
      line-height: 1.6;
      font-size: 14px;
    }
    .memo-count {
      border-radius: 999px;
      padding: 9px 12px;
      background: #eef2f7;
      color: #0f172a;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }
    .map-stage {
      position: relative;
      min-height: 590px;
      overflow: hidden;
      border-radius: 24px;
      background:
        radial-gradient(circle at 18% 42%, rgba(184,117,22,.18), transparent 0 9%, transparent 10%),
        radial-gradient(circle at 50% 35%, rgba(15,23,42,.09), transparent 0 13%, transparent 14%),
        radial-gradient(circle at 72% 47%, rgba(184,117,22,.13), transparent 0 11%, transparent 12%),
        linear-gradient(135deg, #eef2f7 0%, #fbfaf7 54%, #f2eadc 100%);
    }
    .map-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(15,23,42,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15,23,42,.05) 1px, transparent 1px);
      background-size: 58px 58px;
      mask-image: radial-gradient(circle, #000 55%, transparent 95%);
      opacity: .5;
    }
    .continent-label {
      position: absolute;
      color: rgba(17,24,39,.32);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      pointer-events: none;
    }
    .pin {
      position: absolute;
      left: var(--x);
      top: var(--y);
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      width: 35px;
      height: 35px;
      border: 0;
      border-radius: 999px;
      background: #0f172a;
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }
    .pin.is-open {
      background: #b87516;
    }
    .pin::after {
      content: attr(data-label);
      position: absolute;
      left: 50%;
      top: 38px;
      transform: translateX(-50%);
      padding: 5px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.86);
      color: #111827;
      font-size: 11px;
      white-space: nowrap;
    }
    .memo-panel {
      display: grid;
      gap: 14px;
    }
    .memo-card {
      padding: 20px;
    }
    .memo-card h3 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -.04em;
    }
    .memo-card p {
      margin: 10px 0 0;
      color: #667085;
      line-height: 1.62;
      font-size: 14px;
    }
    .memo-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 14px;
    }
    .memo-chip {
      display: inline-flex;
      border-radius: 999px;
      padding: 7px 9px;
      background: #eef2f7;
      color: #344054;
      font-size: 12px;
      font-weight: 850;
    }
    .memo-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-top: 16px;
    }
    .memo-detail,
    .memo-close {
      border: 0;
      border-radius: 999px;
      padding: 10px 13px;
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
    }
    .memo-detail {
      background: #0f172a;
      color: #fff;
    }
    .memo-close {
      background: #eef2f7;
      color: #0f172a;
      cursor: pointer;
    }
    .memo-empty {
      padding: 28px;
      border-radius: 28px;
      background: rgba(255,255,255,.66);
      color: #667085;
      line-height: 1.7;
    }
    @media (max-width: 980px) {
      .wrap { padding: 14px; }
      .geo-hero,
      .geo-layout,
      .geo-stats { grid-template-columns: 1fr; }
      .map-stage { min-height: 520px; }
    }
  </style>
  <link rel="stylesheet" href="/deepfake-policy/dashboard-shell.css?v=20260701-sidebar5" />
</head>
<body>
  <main class="wrap">
    <section class="geo-hero">
      <div>
        <p class="eyebrow" id="eyebrow"></p>
        <h1 id="title"></h1>
        <p class="lead" id="lead"></p>
      </div>
      <select id="lang" class="geo-lang" aria-label="Language">
        <option value="en">English</option>
        <option value="ko">한국어</option>
      </select>
    </section>
    <section class="geo-stats" id="stats"></section>
    <section class="geo-layout">
      <article class="geo-map-card">
        <div class="map-head">
          <div>
            <h2 id="mapTitle"></h2>
            <p class="map-note" id="mapNote"></p>
          </div>
          <span class="memo-count" id="memoCount"></span>
        </div>
        <div class="map-stage" id="mapStage">
          <div class="map-grid" aria-hidden="true"></div>
          <span class="continent-label" style="left:13%;top:32%;">Americas</span>
          <span class="continent-label" style="left:43%;top:25%;">Europe</span>
          <span class="continent-label" style="left:58%;top:45%;">Middle East</span>
          <span class="continent-label" style="left:76%;top:37%;">Asia Pacific</span>
        </div>
      </article>
      <aside class="memo-panel" id="memoPanel"></aside>
    </section>
  </main>
  <script>
    const LANG_KEY = 'deepfakePolicyLang';
    const countries = [
      { slug:'united-states', code:'US', en:'United States', ko:'미국', region:'Americas', x:18, y:39, status:'Federal / state mix', dims:'Election, NCII, platform', note:'A fragmented model with federal, state, election, and intimate-image pathways.' },
      { slug:'argentina', code:'AR', en:'Argentina', ko:'아르헨티나', region:'Americas', x:28, y:72, status:'Proposed / partial', dims:'Election, privacy', note:'A South American reference case where deepfake harms are mostly read through layered older categories.' },
      { slug:'united-kingdom', code:'UK', en:'United Kingdom', ko:'영국', region:'Europe', x:46, y:33, status:'Online safety / criminal law', dims:'NCII, platform, fraud', note:'Regulation relies on online safety duties and targeted criminal-law reforms.' },
      { slug:'france', code:'FR', en:'France', ko:'프랑스', region:'Europe', x:48, y:38, status:'Criminal / platform', dims:'Disclosure, dignity', note:'The French pathway emphasizes image rights, dignity, and targeted transparency duties.' },
      { slug:'germany', code:'DE', en:'Germany', ko:'독일', region:'Europe', x:51, y:35, status:'Criminal / media law', dims:'Personality rights, platform', note:'German treatment is tied to personality rights, media governance, and criminal-law categories.' },
      { slug:'eu', code:'EU', en:'European Union', ko:'유럽연합', region:'Europe', x:53, y:40, status:'AI Act / platform', dims:'Transparency, risk, platform', note:'The EU creates a layered supranational approach through AI Act transparency and platform governance.' },
      { slug:'saudi-arabia', code:'SA', en:'Saudi Arabia', ko:'사우디아라비아', region:'Africa / Middle East', x:59, y:52, status:'Cybercrime / platform', dims:'Cybercrime, public order', note:'Deepfake harms are mainly visible through cybercrime, fraud, and public-order controls.' },
      { slug:'united-arab-emirates', code:'UAE', en:'United Arab Emirates', ko:'아랍에미리트', region:'Africa / Middle East', x:63, y:54, status:'Cybercrime / AI governance', dims:'Cybercrime, privacy, AI', note:'The UAE combines cybercrime provisions with AI governance and platform responsibility.' },
      { slug:'india', code:'IN', en:'India', ko:'인도', region:'Pacific / Asia', x:69, y:55, status:'IT rules / advisories', dims:'Platform, NCII, disclosure', note:'India combines IT rules, platform advisories, and NCII/fraud enforcement pathways.' },
      { slug:'pakistan', code:'PK', en:'Pakistan', ko:'파키스탄', region:'Pacific / Asia', x:66, y:50, status:'Cybercrime / draft', dims:'Cybercrime, dignity', note:'Pakistan is mainly mapped through cybercrime, dignity, and proposed AI-content rules.' },
      { slug:'china', code:'CN', en:'China', ko:'중국', region:'Pacific / Asia', x:76, y:43, status:'Deep synthesis rules', dims:'Labeling, platform, security', note:'China has one of the clearest deep-synthesis governance paths with labeling and platform duties.' },
      { slug:'korea', code:'KR', en:'Korea', ko:'한국', region:'Pacific / Asia', x:82, y:43, status:'Criminal / election / labeling', dims:'NCII, election, labeling', note:'Korea combines criminal law, election rules, platform obligations, and AI labeling debates.' },
      { slug:'singapore', code:'SG', en:'Singapore', ko:'싱가포르', region:'Pacific / Asia', x:76, y:65, status:'Online falsehoods / elections', dims:'Election, correction, platform', note:'Singapore centers legal visibility around falsehood correction, elections, and online harms.' },
      { slug:'australia', code:'AU', en:'Australia', ko:'호주', region:'Pacific / Asia', x:82, y:78, status:'Online safety / criminal law', dims:'NCII, platform, safety', note:'Australia uses online safety, NCII, criminal-law, and platform accountability pathways.' }
    ];
    const T = {
      en: {
        eyebrow:'Geography',
        title:'Geographic policy map',
        lead:'Open up to four jurisdiction memos at once. Each memo summarizes the legal pathway and links to the country dashboard.',
        mapTitle:'Supported jurisdictions',
        mapNote:'Pins are schematic rather than cartographic. The goal is fast comparison, not geographic precision.',
        memoCount:(n)=>`${n}/4 memos open`,
        empty:'Select country pins to open memo cards. Up to four memos can stay open for side-by-side comparison.',
        detail:'Details',
        close:'Close',
        stats:[['14','supported jurisdictions'],['4','memo comparison slots'],['4','regional groups']]
      },
      ko: {
        eyebrow:'Geography',
        title:'지리 기반 정책 지도',
        lead:'국가 핀을 눌러 최대 4개 메모를 동시에 열 수 있습니다. 각 메모는 해당 국가의 법적 경로를 요약하고 국가 상세 페이지로 연결됩니다.',
        mapTitle:'지원 국가 지도',
        mapNote:'핀 위치는 정확한 지도 좌표가 아니라 비교를 위한 개략적 배치입니다.',
        memoCount:(n)=>`${n}/4 메모 열림`,
        empty:'국가 핀을 선택하면 메모 카드가 열립니다. 최대 4개 국가를 나란히 비교할 수 있습니다.',
        detail:'자세히',
        close:'닫기',
        stats:[['14','지원 관할권'],['4','메모 비교 슬롯'],['4','지역 그룹']]
      }
    };
    function lang() {
      const q = new URLSearchParams(location.search).get('lang');
      if (q === 'ko' || q === 'en') return q;
      try { return localStorage.getItem(LANG_KEY) === 'ko' ? 'ko' : 'en'; } catch (_) { return 'en'; }
    }
    function withLang(path) {
      const url = new URL(path, location.origin);
      url.searchParams.set('lang', lang());
      return url.pathname + url.search;
    }
    let open = [];
    function render() {
      const l = lang();
      const t = T[l];
      document.documentElement.lang = l;
      document.getElementById('lang').value = l;
      document.getElementById('eyebrow').textContent = t.eyebrow;
      document.getElementById('title').textContent = t.title;
      document.getElementById('lead').textContent = t.lead;
      document.getElementById('mapTitle').textContent = t.mapTitle;
      document.getElementById('mapNote').textContent = t.mapNote;
      document.getElementById('stats').innerHTML = t.stats.map(([num, label]) => `<article class="geo-stat"><strong>${num}</strong><span>${label}</span></article>`).join('');
      const stage = document.getElementById('mapStage');
      stage.querySelectorAll('.pin').forEach((el) => el.remove());
      countries.forEach((c) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'pin' + (open.includes(c.slug) ? ' is-open' : '');
        btn.style.setProperty('--x', c.x + '%');
        btn.style.setProperty('--y', c.y + '%');
        btn.dataset.slug = c.slug;
        btn.dataset.label = l === 'ko' ? c.ko : c.en;
        btn.textContent = c.code;
        btn.addEventListener('click', () => toggle(c.slug));
        stage.appendChild(btn);
      });
      document.getElementById('memoCount').textContent = t.memoCount(open.length);
      const panel = document.getElementById('memoPanel');
      panel.innerHTML = open.length ? open.map((slug) => {
        const c = countries.find((item) => item.slug === slug);
        return `<article class="memo-card">
          <h3>${l === 'ko' ? c.ko : c.en}</h3>
          <p>${c.note}</p>
          <div class="memo-meta">
            <span class="memo-chip">${c.region}</span>
            <span class="memo-chip">${c.status}</span>
            <span class="memo-chip">${c.dims}</span>
          </div>
          <div class="memo-actions">
            <a class="memo-detail" href="${withLang('/deepfake-policy/country/' + c.slug + '/')}">${t.detail}</a>
            <button class="memo-close" type="button" data-close="${c.slug}">${t.close}</button>
          </div>
        </article>`;
      }).join('') : `<div class="memo-empty">${t.empty}</div>`;
      panel.querySelectorAll('[data-close]').forEach((btn) => btn.addEventListener('click', () => toggle(btn.dataset.close, true)));
    }
    function toggle(slug, forceClose = false) {
      if (open.includes(slug) || forceClose) open = open.filter((item) => item !== slug);
      else {
        if (open.length >= 4) open.shift();
        open.push(slug);
      }
      render();
    }
    document.getElementById('lang').addEventListener('change', (event) => {
      try { localStorage.setItem(LANG_KEY, event.target.value); } catch (_) {}
      const url = new URL(location.href);
      url.searchParams.set('lang', event.target.value);
      location.href = url.pathname + url.search + url.hash;
    });
    open = ['korea', 'china'];
    render();
  </script>
  <script src="/deepfake-policy/dashboard-shell.js?v=20260701-sidebar5"></script>
</body>
</html>
